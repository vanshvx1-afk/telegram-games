
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="description" content="Meow Games - Premium Casino Gaming Platform">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Meow Games | Premium Casino</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* ============================================
           SECTION 1: CSS VARIABLES & ROOT CONFIGURATION
           ============================================ */
        :root {
            /* Primary Colors */
            --primary-bg: #0a0a1a;
            --secondary-bg: #12122a;
            --tertiary-bg: #1a1a3e;
            --card-bg: #16163a;
            --card-hover: #1e1e4a;
            
            /* Accent Colors */
            --accent-primary: #6c5ce7;
            --accent-secondary: #a29bfe;
            --accent-gradient: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            --accent-glow: rgba(108, 92, 231, 0.5);
            
            /* Game Colors */
            --win-color: #00d26a;
            --win-glow: rgba(0, 210, 106, 0.5);
            --lose-color: #ff4757;
            --lose-glow: rgba(255, 71, 87, 0.5);
            --warning-color: #ffa502;
            --warning-glow: rgba(255, 165, 2, 0.5);
            
            /* Mines Game Colors */
            --mine-safe: #00d26a;
            --mine-bomb: #ff4757;
            --mine-hidden: #2a2a5a;
            --mine-hover: #3a3a7a;
            
            /* Crash Game Colors */
            --crash-line: #00d26a;
            --crash-explosion: #ff4757;
            --crash-rocket: #ffa502;
            
            /* Text Colors */
            --text-primary: #ffffff;
            --text-secondary: #b4b4d4;
            --text-muted: #6c6c9c;
            --text-accent: #a29bfe;
            
            /* Border & Shadow */
            --border-color: rgba(108, 92, 231, 0.3);
            --border-glow: rgba(108, 92, 231, 0.6);
            --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 20px var(--accent-glow);
            
            /* Spacing */
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --spacing-xxl: 48px;
            
            /* Border Radius */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --radius-full: 9999px;
            
            /* Transitions */
            --transition-fast: 0.15s ease;
            --transition-normal: 0.3s ease;
            --transition-slow: 0.5s ease;
            --transition-bounce: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            
            /* Typography */
            --font-primary: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-display: 'Orbitron', monospace;
            
            /* Z-Index Layers */
            --z-base: 1;
            --z-dropdown: 100;
            --z-sticky: 200;
            --z-modal: 300;
            --z-toast: 400;
            --z-admin: 500;
            --z-loading: 600;
        }

        /* ============================================
           SECTION 2: CSS RESET & BASE STYLES
           ============================================ */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 16px;
            -webkit-tap-highlight-color: transparent;
            -webkit-text-size-adjust: 100%;
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-primary);
            background: var(--primary-bg);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(108, 92, 231, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(162, 155, 254, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(108, 92, 231, 0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button {
            font-family: inherit;
            border: none;
            background: none;
            cursor: pointer;
            outline: none;
        }

        input, select, textarea {
            font-family: inherit;
            outline: none;
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        ul, ol {
            list-style: none;
        }

        /* ============================================
           SECTION 3: UTILITY CLASSES
           ============================================ */
        .hidden {
            display: none !important;
        }

        .invisible {
            visibility: hidden;
            opacity: 0;
        }

        .flex {
            display: flex;
        }

        .flex-center {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .flex-between {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .flex-col {
            flex-direction: column;
        }

        .gap-xs { gap: var(--spacing-xs); }
        .gap-sm { gap: var(--spacing-sm); }
        .gap-md { gap: var(--spacing-md); }
        .gap-lg { gap: var(--spacing-lg); }

        .text-center { text-align: center; }
        .text-right { text-align: right; }

        .font-display { font-family: var(--font-display); }

        .text-primary { color: var(--text-primary); }
        .text-secondary { color: var(--text-secondary); }
        .text-muted { color: var(--text-muted); }
        .text-accent { color: var(--text-accent); }
        .text-win { color: var(--win-color); }
        .text-lose { color: var(--lose-color); }

        .bg-gradient {
            background: var(--accent-gradient);
        }

        .truncate {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ============================================
           SECTION 4: LOADING SCREEN STYLES
           ============================================ */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--primary-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: var(--z-loading);
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        #loading-screen.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        .loading-logo {
            width: 120px;
            height: 120px;
            margin-bottom: var(--spacing-xl);
            animation: pulse-glow 2s ease-in-out infinite;
        }

        .loading-logo svg {
            width: 100%;
            height: 100%;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid var(--tertiary-bg);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: var(--spacing-lg);
        }

        .loading-text {
            font-family: var(--font-display);
            font-size: 1.2rem;
            color: var(--text-secondary);
            letter-spacing: 2px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .loading-progress {
            width: 200px;
            height: 4px;
            background: var(--tertiary-bg);
            border-radius: var(--radius-full);
            margin-top: var(--spacing-lg);
            overflow: hidden;
        }

        .loading-progress-bar {
            height: 100%;
            background: var(--accent-gradient);
            border-radius: var(--radius-full);
            width: 0%;
            transition: width 0.3s ease;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes pulse-glow {
            0%, 100% { 
                filter: drop-shadow(0 0 10px var(--accent-glow));
                transform: scale(1);
            }
            50% { 
                filter: drop-shadow(0 0 30px var(--accent-glow));
                transform: scale(1.05);
            }
        }

        /* ============================================
           SECTION 5: MAIN APP CONTAINER
           ============================================ */
        #app {
            position: relative;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            z-index: var(--z-base);
        }

        /* ============================================
           SECTION 6: HEADER STYLES
           ============================================ */
        .header {
            position: sticky;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: rgba(18, 18, 42, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 var(--spacing-md);
            z-index: var(--z-sticky);
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }

        .header-logo-icon {
            width: 40px;
            height: 40px;
            background: var(--accent-gradient);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform var(--transition-bounce), box-shadow var(--transition-normal);
        }

        .header-logo-icon:hover {
            transform: scale(1.1) rotate(-5deg);
            box-shadow: var(--shadow-glow);
        }

        .header-logo-icon:active {
            transform: scale(0.95);
        }

        .header-logo-icon svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .header-logo-text {
            font-family: var(--font-display);
            font-size: 1.25rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }

        .header-balance {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            background: var(--card-bg);
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: var(--radius-full);
            border: 1px solid var(--border-color);
            transition: all var(--transition-normal);
        }

        .header-balance:hover {
            border-color: var(--border-glow);
            box-shadow: var(--shadow-glow);
        }

        .balance-icon {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, #ffd700 0%, #ffaa00 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            animation: coin-shine 3s ease-in-out infinite;
        }

        @keyframes coin-shine {
            0%, 100% { box-shadow: 0 0 5px rgba(255, 215, 0, 0.5); }
            50% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.8); }
        }

        .balance-amount {
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            min-width: 80px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .header-btn {
            width: 40px;
            height: 40px;
            background: var(--card-bg);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            transition: all var(--transition-normal);
        }

        .header-btn:hover {
            background: var(--card-hover);
            color: var(--text-primary);
            border-color: var(--border-glow);
            transform: translateY(-2px);
        }

        .header-btn:active {
            transform: translateY(0) scale(0.95);
        }

        .header-btn svg {
            width: 20px;
            height: 20px;
        }

        /* ============================================
           SECTION 7: MAIN CONTENT AREA
           ============================================ */
        .main-content {
            flex: 1;
            padding: var(--spacing-md);
            padding-bottom: calc(70px + var(--spacing-md) + env(safe-area-inset-bottom, 0px));
            max-width: 100%;
            overflow-x: hidden;
        }

        /* ============================================
           SECTION 8: VIEW MANAGEMENT
           ============================================ */
        .view {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .view.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* ============================================
           SECTION 9: DASHBOARD VIEW
           ============================================ */
        .dashboard-greeting {
            margin-bottom: var(--spacing-lg);
        }

        .greeting-text {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: var(--spacing-xs);
        }

        .greeting-subtext {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Daily Bonus Card */
        .bonus-card {
            background: linear-gradient(135deg, var(--accent-primary) 0%, #8b7cf7 50%, var(--accent-secondary) 100%);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-lg);
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-lg);
        }

        .bonus-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-20%, 20%); }
        }

        .bonus-card-content {
            position: relative;
            z-index: 1;
        }

        .bonus-title {
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: var(--spacing-xs);
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .bonus-title-icon {
            font-size: 1.5rem;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .bonus-description {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: var(--spacing-md);
        }

        .bonus-timer {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-bottom: var(--spacing-md);
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
        }

        .bonus-btn {
            width: 100%;
            padding: var(--spacing-md) var(--spacing-lg);
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: var(--radius-md);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all var(--transition-normal);
            backdrop-filter: blur(10px);
        }

        .bonus-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .bonus-btn:active:not(:disabled) {
            transform: translateY(0) scale(0.98);
        }

        .bonus-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .bonus-btn.claimed {
            background: rgba(0, 210, 106, 0.3);
            border-color: rgba(0, 210, 106, 0.5);
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            border: 1px solid var(--border-color);
            transition: all var(--transition-normal);
        }

        .stat-card:hover {
            border-color: var(--border-glow);
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        .stat-icon {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: var(--spacing-sm);
            font-size: 1.2rem;
        }

        .stat-icon.wins {
            background: rgba(0, 210, 106, 0.2);
            color: var(--win-color);
        }

        .stat-icon.losses {
            background: rgba(255, 71, 87, 0.2);
            color: var(--lose-color);
        }

        .stat-icon.played {
            background: rgba(108, 92, 231, 0.2);
            color: var(--accent-primary);
        }

        .stat-icon.earnings {
            background: rgba(255, 165, 2, 0.2);
            color: var(--warning-color);
        }

        .stat-value {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Games Section */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--spacing-md);
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .section-title-icon {
            font-size: 1.3rem;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--spacing-md);
        }

        .game-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: all var(--transition-normal);
            cursor: pointer;
            position: relative;
        }

        .game-card:hover {
            border-color: var(--border-glow);
            transform: translateY(-4px);
            box-shadow: var(--shadow-glow);
        }

        .game-card:active {
            transform: translateY(-2px) scale(0.98);
        }

        .game-card-image {
            width: 100%;
            aspect-ratio: 16/10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            position: relative;
            overflow: hidden;
        }

        .game-card-image::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            opacity: 0.8;
        }

        .game-card-image.mines::before {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
        }

        .game-card-image.crash::before {
            background: linear-gradient(135deg, #ffa502 0%, #ff7f50 100%);
        }

        .game-card-image.dice::before {
            background: linear-gradient(135deg, #00d26a 0%, #00b359 100%);
        }

        .game-card-image.plinko::before {
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
        }

        .game-card-image.wheel::before {
            background: linear-gradient(135deg, #e84393 0%, #fd79a8 100%);
        }

        .game-card-image span {
            position: relative;
            z-index: 1;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .game-card-info {
            padding: var(--spacing-md);
        }

        .game-card-title {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: var(--spacing-xs);
        }

        .game-card-desc {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .game-card-badge {
            position: absolute;
            top: var(--spacing-sm);
            right: var(--spacing-sm);
            background: var(--accent-gradient);
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ============================================
           SECTION 10: GAME VIEW COMMON STYLES
           ============================================ */
        .game-header {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
        }

        .game-back-btn {
            width: 44px;
            height: 44px;
            background: var(--card-bg);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            transition: all var(--transition-normal);
        }

        .game-back-btn:hover {
            background: var(--card-hover);
            color: var(--text-primary);
            border-color: var(--border-glow);
        }

        .game-back-btn:active {
            transform: scale(0.95);
        }

        .game-title {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
        }

        .game-container {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .game-area {
            padding: var(--spacing-md);
            min-height: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .game-controls {
            padding: var(--spacing-md);
            background: var(--secondary-bg);
            border-top: 1px solid var(--border-color);
        }

        /* Bet Input */
        .bet-input-group {
            margin-bottom: var(--spacing-md);
        }

        .bet-label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--spacing-sm);
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .bet-input-wrapper {
            display: flex;
            align-items: stretch;
            background: var(--primary-bg);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            overflow: hidden;
            transition: border-color var(--transition-normal);
        }

        .bet-input-wrapper:focus-within {
            border-color: var(--accent-primary);
        }

        .bet-input-icon {
            width: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--tertiary-bg);
            color: var(--warning-color);
            font-size: 1rem;
        }

        .bet-input {
            flex: 1;
            padding: var(--spacing-md);
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 600;
            min-width: 0;
        }

        .bet-input::placeholder {
            color: var(--text-muted);
        }

        .bet-quick-btns {
            display: flex;
            border-left: 1px solid var(--border-color);
        }

        .bet-quick-btn {
            padding: 0 var(--spacing-md);
            background: var(--tertiary-bg);
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 600;
            border-left: 1px solid var(--border-color);
            transition: all var(--transition-fast);
        }

        .bet-quick-btn:first-child {
            border-left: none;
        }

        .bet-quick-btn:hover {
            background: var(--card-hover);
            color: var(--text-primary);
        }

        .bet-quick-btn:active {
            background: var(--accent-primary);
        }

        /* Primary Game Button */
        .game-btn {
            width: 100%;
            padding: var(--spacing-md) var(--spacing-lg);
            background: var(--accent-gradient);
            border-radius: var(--radius-md);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all var(--transition-normal);
            position: relative;
            overflow: hidden;
        }

        .game-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .game-btn:hover::before {
            left: 100%;
        }

        .game-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px var(--accent-glow);
        }

        .game-btn:active {
            transform: translateY(0) scale(0.98);
        }

        .game-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .game-btn:disabled::before {
            display: none;
        }

        .game-btn.danger {
            background: linear-gradient(135deg, var(--lose-color) 0%, #ff6b7a 100%);
        }

        .game-btn.success {
            background: linear-gradient(135deg, var(--win-color) 0%, #00e676 100%);
        }

        /* Multiplier Display */
        .multiplier-display {
            font-family: var(--font-display);
            font-size: 3rem;
            font-weight: 900;
            text-align: center;
            margin: var(--spacing-lg) 0;
            transition: all var(--transition-normal);
        }

        .multiplier-display.win {
            color: var(--win-color);
            text-shadow: 0 0 30px var(--win-glow);
        }

        .multiplier-display.lose {
            color: var(--lose-color);
            text-shadow: 0 0 30px var(--lose-glow);
        }

        /* Result Display */
        .result-display {
            text-align: center;
            padding: var(--spacing-lg);
            animation: scaleIn 0.3s ease;
        }

        .result-icon {
            font-size: 4rem;
            margin-bottom: var(--spacing-md);
        }

        .result-text {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: var(--spacing-sm);
        }

        .result-amount {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 900;
        }

        .result-amount.win {
            color: var(--win-color);
        }

        .result-amount.lose {
            color: var(--lose-color);
        }

        /* ============================================
           SECTION 11: MINES GAME SPECIFIC STYLES
           ============================================ */
        .mines-grid {
            display: grid;
            gap: 8px;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }

        .mines-tile {
            aspect-ratio: 1;
            background: var(--mine-hidden);
            border-radius: var(--radius-md);
            border: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all var(--transition-normal);
            position: relative;
            overflow: hidden;
        }

        .mines-tile::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
        }

        .mines-tile:hover:not(.revealed):not(.disabled) {
            background: var(--mine-hover);
            border-color: var(--accent-primary);
            transform: scale(1.05);
        }

        .mines-tile:hover:not(.revealed):not(.disabled)::before {
            width: 150%;
            height: 150%;
        }

        .mines-tile:active:not(.revealed):not(.disabled) {
            transform: scale(0.95);
        }

        .mines-tile.revealed {
            cursor: default;
            animation: revealTile 0.3s ease;
        }

        .mines-tile.revealed.safe {
            background: linear-gradient(135deg, var(--mine-safe) 0%, #00e676 100%);
            border-color: var(--mine-safe);
            box-shadow: 0 0 15px var(--win-glow);
        }

        .mines-tile.revealed.bomb {
            background: linear-gradient(135deg, var(--mine-bomb) 0%, #ff6b7a 100%);
            border-color: var(--mine-bomb);
            box-shadow: 0 0 15px var(--lose-glow);
            animation: explode 0.5s ease;
        }

        .mines-tile.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .mines-tile-content {
            position: relative;
            z-index: 1;
            transition: transform var(--transition-bounce);
        }

        .mines-tile.revealed .mines-tile-content {
            transform: scale(1.2);
        }

        @keyframes revealTile {
            0% { transform: rotateY(0deg); }
            50% { transform: rotateY(90deg); }
            100% { transform: rotateY(0deg); }
        }

        @keyframes explode {
            0% { transform: scale(1); }
            20% { transform: scale(1.3); }
            40% { transform: scale(0.9); }
            60% { transform: scale(1.1); }
            80% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }

        .mines-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: var(--spacing-md);
            padding: var(--spacing-sm) var(--spacing-md);
            background: var(--tertiary-bg);
            border-radius: var(--radius-md);
        }

        .mines-info-item {
            text-align: center;
        }

        .mines-info-value {
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-secondary);
        }

        .mines-info-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* Mines Settings */
        .mines-settings {
            margin-bottom: var(--spacing-md);
        }

        .mines-setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--spacing-sm) 0;
        }

        .mines-setting-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .mines-setting-value {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .mines-setting-btn {
            width: 32px;
            height: 32px;
            background: var(--tertiary-bg);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 1.2rem;
            transition: all var(--transition-fast);
        }

        .mines-setting-btn:hover {
            background: var(--accent-primary);
            color: white;
        }

        .mines-setting-number {
            font-family: var(--font-display);
            font-weight: 700;
            min-width: 30px;
            text-align: center;
        }

        /* ============================================
           SECTION 12: CRASH GAME SPECIFIC STYLES
           ============================================ */
        .crash-container {
            width: 100%;
            position: relative;
        }

        .crash-graph {
            width: 100%;
            height: 250px;
            background: var(--primary-bg);
            border-radius: var(--radius-md);
            position: relative;
            overflow: hidden;
            margin-bottom: var(--spacing-md);
        }

        .crash-canvas {
            width: 100%;
            height: 100%;
        }

        .crash-multiplier {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: var(--font-display);
            font-size: 3.5rem;
            font-weight: 900;
            text-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            transition: all var(--transition-fast);
            z-index: 10;
        }

        .crash-multiplier.flying {
            color: var(--win-color);
            text-shadow: 0 0 30px var(--win-glow);
        }

        .crash-multiplier.crashed {
            color: var(--lose-color);
            text-shadow: 0 0 30px var(--lose-glow);
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translate(-50%, -50%) rotate(0deg); }
            25% { transform: translate(-48%, -52%) rotate(-5deg); }
            50% { transform: translate(-52%, -50%) rotate(5deg); }
            75% { transform: translate(-50%, -48%) rotate(-3deg); }
        }

        .crash-rocket {
            position: absolute;
            font-size: 2rem;
            transition: all 0.1s linear;
            z-index: 5;
            filter: drop-shadow(0 0 10px var(--crash-rocket));
        }

        .crash-rocket.exploded {
            animation: rocketExplode 0.5s ease forwards;
        }

        @keyframes rocketExplode {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(2); opacity: 0.5; }
            100% { transform: scale(0); opacity: 0; }
        }

        .crash-status {
            text-align: center;
            padding: var(--spacing-sm);
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .crash-status.waiting {
            color: var(--warning-color);
        }

        .crash-status.flying {
            color: var(--win-color);
        }

        .crash-status.crashed {
            color: var(--lose-color);
        }

        .crash-auto-cashout {
            margin-top: var(--spacing-md);
        }

        .crash-auto-toggle {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-sm);
        }

        .toggle-switch {
            position: relative;
            width: 48px;
            height: 26px;
            background: var(--tertiary-bg);
            border-radius: var(--radius-full);
            cursor: pointer;
            transition: background var(--transition-normal);
        }

        .toggle-switch.active {
            background: var(--accent-primary);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: transform var(--transition-normal);
            box-shadow: var(--shadow-sm);
        }

        .toggle-switch.active::after {
            transform: translateX(22px);
        }

        .crash-auto-input {
            width: 100%;
            padding: var(--spacing-sm) var(--spacing-md);
            background: var(--primary-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-family: var(--font-display);
            font-size: 1rem;
        }

        /* ============================================
           SECTION 13: DICE GAME SPECIFIC STYLES
           ============================================ */
        .dice-container {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }

        .dice-display {
            text-align: center;
            margin-bottom: var(--spacing-lg);
        }

        .dice-result {
            font-family: var(--font-display);
            font-size: 5rem;
            font-weight: 900;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: var(--spacing-sm);
            transition: all var(--transition-normal);
        }

        .dice-result.rolling {
            animation: diceRoll 0.1s linear infinite;
        }

        @keyframes diceRoll {
            0% { transform: translateY(0); }
            25% { transform: translateY(-5px); }
            50% { transform: translateY(0); }
            75% { transform: translateY(5px); }
            100% { transform: translateY(0); }
        }

        .dice-slider-container {
            margin-bottom: var(--spacing-lg);
        }

        .dice-slider {
            width: 100%;
            height: 8px;
            -webkit-appearance: none;
            appearance: none;
            background: linear-gradient(to right, var(--win-color) 0%, var(--win-color) var(--value), var(--lose-color) var(--value), var(--lose-color) 100%);
            border-radius: var(--radius-full);
            outline: none;
            cursor: pointer;
        }

        .dice-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: var(--shadow-md);
            transition: transform var(--transition-fast);
        }

        .dice-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .dice-slider::-moz-range-thumb {
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            border: none;
            box-shadow: var(--shadow-md);
        }

        .dice-info-row {
            display: flex;
            justify-content: space-between;
            margin-top: var(--spacing-sm);
        }

        .dice-info-item {
            text-align: center;
        }

        .dice-info-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 2px;
        }

        .dice-info-value {
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 700;
        }

        .dice-type-btns {
            display: flex;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-md);
        }

        .dice-type-btn {
            flex: 1;
            padding: var(--spacing-md);
            background: var(--tertiary-bg);
            border-radius: var(--radius-md);
            border: 2px solid var(--border-color);
            color: var(--text-secondary);
            font-weight: 600;
            transition: all var(--transition-normal);
        }

        .dice-type-btn.active {
            border-color: var(--accent-primary);
            color: var(--text-primary);
            background: rgba(108, 92, 231, 0.2);
        }

        .dice-type-btn:hover:not(.active) {
            border-color: var(--border-glow);
            color: var(--text-primary);
        }

        /* ============================================
           SECTION 14: PLINKO GAME SPECIFIC STYLES
           ============================================ */
        .plinko-container {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }

        .plinko-board {
            width: 100%;
            aspect-ratio: 3/4;
            background: var(--primary-bg);
            border-radius: var(--radius-lg);
            position: relative;
            overflow: hidden;
            margin-bottom: var(--spacing-md);
        }

        .plinko-canvas {
            width: 100%;
            height: 100%;
        }

        .plinko-multipliers {
            display: flex;
            justify-content: space-around;
            padding: var(--spacing-sm);
            background: var(--tertiary-bg);
            border-radius: var(--radius-md);
            margin-bottom: var(--spacing-md);
        }

        .plinko-multiplier {
            padding: var(--spacing-xs) var(--spacing-sm);
            border-radius: var(--radius-sm);
            font-family: var(--font-display);
            font-size: 0.7rem;
            font-weight: 700;
            transition: all var(--transition-normal);
        }

        .plinko-multiplier.low {
            background: rgba(255, 71, 87, 0.2);
            color: var(--lose-color);
        }

        .plinko-multiplier.medium {
            background: rgba(255, 165, 2, 0.2);
            color: var(--warning-color);
        }

        .plinko-multiplier.high {
            background: rgba(0, 210, 106, 0.2);
            color: var(--win-color);
        }

        .plinko-multiplier.active {
            transform: scale(1.2);
            box-shadow: 0 0 15px currentColor;
        }

        .plinko-risk-selector {
            display: flex;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-md);
        }

        .plinko-risk-btn {
            flex: 1;
            padding: var(--spacing-sm) var(--spacing-md);
            background: var(--tertiary-bg);
            border-radius: var(--radius-md);
            border: 2px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 600;
            transition: all var(--transition-normal);
        }

        .plinko-risk-btn.active {
            border-color: var(--accent-primary);
            color: var(--text-primary);
            background: rgba(108, 92, 231, 0.2);
        }

        .plinko-risk-btn.low { border-color: var(--win-color); }
        .plinko-risk-btn.low.active { background: rgba(0, 210, 106, 0.2); }
        
        .plinko-risk-btn.medium { border-color: var(--warning-color); }
        .plinko-risk-btn.medium.active { background: rgba(255, 165, 2, 0.2); }
        
        .plinko-risk-btn.high { border-color: var(--lose-color); }
        .plinko-risk-btn.high.active { background: rgba(255, 71, 87, 0.2); }

        /* ============================================
           SECTION 15: WHEEL GAME SPECIFIC STYLES
           ============================================ */
        .wheel-container {
            width: 100%;
            max-width: 350px;
            margin: 0 auto;
        }

        .wheel-wrapper {
            position: relative;
            margin-bottom: var(--spacing-lg);
        }

        .wheel-pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid var(--accent-primary);
            filter: drop-shadow(0 2px 5px rgba(0, 0, 0, 0.5));
            z-index: 10;
        }

        .wheel-canvas-container {
            width: 100%;
            aspect-ratio: 1;
            position: relative;
        }

        .wheel-canvas {
            width: 100%;
            height: 100%;
            transition: transform 0.1s linear;
        }

        .wheel-canvas.spinning {
            animation: none;
        }

        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: var(--accent-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-size: 0.8rem;
            font-weight: 700;
            box-shadow: 0 0 20px var(--accent-glow);
            z-index: 5;
        }

        .wheel-result {
            text-align: center;
            margin-bottom: var(--spacing-md);
        }

        .wheel-result-multiplier {
            font-family: var(--font-display);
            font-size: 2.5rem;
            font-weight: 900;
        }

        /* ============================================
           SECTION 16: BOTTOM NAVIGATION
           ============================================ */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(18, 18, 42, 0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding-bottom: env(safe-area-inset-bottom, 0px);
            z-index: var(--z-sticky);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: var(--spacing-sm) var(--spacing-md);
            color: var(--text-muted);
            transition: all var(--transition-normal);
            position: relative;
        }

        .nav-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 3px;
            background: var(--accent-gradient);
            border-radius: 0 0 var(--radius-sm) var(--radius-sm);
            transition: width var(--transition-normal);
        }

        .nav-item.active {
            color: var(--accent-primary);
        }

        .nav-item.active::before {
            width: 30px;
        }

        .nav-item:hover {
            color: var(--text-primary);
        }

        .nav-icon {
            font-size: 1.4rem;
            transition: transform var(--transition-bounce);
        }

        .nav-item:hover .nav-icon {
            transform: translateY(-2px);
        }

        .nav-item.active .nav-icon {
            transform: scale(1.1);
        }

        .nav-label {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ============================================
           SECTION 17: TOAST NOTIFICATIONS
           ============================================ */
        .toast-container {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 400px;
            z-index: var(--z-toast);
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
            pointer-events: none;
        }

        .toast {
            background: var(--card-bg);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            animation: toastIn 0.3s ease;
            pointer-events: auto;
        }

        .toast.hiding {
            animation: toastOut 0.3s ease forwards;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(-20px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes toastOut {

        const Utils = {
            /**
             * Format number as currency
             */
            formatCurrency(amount, decimals = 2) {
                return `${CONFIG.app.currencySymbol}${amount.toFixed(decimals).replace(/\B(?=(\d{3})+(?!\d))/g, ',')}`;
            },

            /**
             * Format number with K/M/B suffix
             */
            formatCompact(num) {
                if (num >= 1e9) return (num / 1e9).toFixed(1) + 'B';
                if (num >= 1e6) return (num / 1e6).toFixed(1) + 'M';
                if (num >= 1e3) return (num / 1e3).toFixed(1) + 'K';
                return num.toFixed(2);
            },

            /**
             * Generate random number between min and max
             */
            random(min, max) {
                return Math.random() * (max - min) + min;
            },

            /**
             * Generate random integer between min and max (inclusive)
             */
            randomInt(min, max) {
                return Math.floor(Math.random() * (max - min + 1)) + min;
            },

            /**
             * Generate seeded random for provably fair
             */
            seededRandom(seed) {
                const x = Math.sin(seed) * 10000;
                return x - Math.floor(x);
            },

            /**
             * Generate unique ID
             */
            generateId() {
                return Date.now().toString(36) + Math.random().toString(36).substr(2);
            },

            /**
             * Clamp value between min and max
             */
            clamp(value, min, max) {
                return Math.min(Math.max(value, min), max);
            },

            /**
             * Debounce function
             */
            debounce(func, wait) {
                let timeout;
                return function executedFunction(...args) {
                    const later = () => {
                        clearTimeout(timeout);
                        func(...args);
                    };
                    clearTimeout(timeout);
                    timeout = setTimeout(later, wait);
                };
            },

            /**
             * Throttle function
             */
            throttle(func, limit) {
                let inThrottle;
                return function executedFunction(...args) {
                    if (!inThrottle) {
                        func(...args);
                        inThrottle = true;
                        setTimeout(() => inThrottle = false, limit);
                    }
                };
            },

            /**
             * Sleep/delay function
             */
            sleep(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            },

            /**
             * Check if device supports vibration
             */
            canVibrate() {
                return 'vibrate' in navigator;
            },

            /**
             * Trigger vibration
             */
            vibrate(pattern = 100) {
                if (this.canVibrate()) {
                    navigator.vibrate(pattern);
                }
            },

            /**
             * Get time until next reset (24 hours from timestamp)
             */
            getTimeUntilReset(timestamp) {
                const resetTime = timestamp + CONFIG.player.dailyBonusCooldown;
                const now = Date.now();
                const diff = resetTime - now;
                
                if (diff <= 0) return null;
                
                const hours = Math.floor(diff / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                
                return { hours, minutes, seconds, total: diff };
            },

            /**
             * Format time remaining
             */
            formatTimeRemaining(time) {
                if (!time) return 'Available!';
                return `${time.hours.toString().padStart(2, '0')}:${time.minutes.toString().padStart(2, '0')}:${time.seconds.toString().padStart(2, '0')}`;
            },

            /**
             * Parse URL parameters
             */
            getUrlParams() {
                const params = new URLSearchParams(window.location.search);
                const result = {};
                for (const [key, value] of params) {
                    result[key] = value;
                }
                return result;
            },

            /**
             * Check if URL contains admin key
             */
            checkAdminUrlKey() {
                const url = window.location.href.toLowerCase();
                return url.includes(CONFIG.admin.urlKey.toLowerCase());
            },

            /**
             * Linear interpolation
             */
            lerp(start, end, t) {
                return start + (end - start) * t;
            },

            /**
             * Ease out quad
             */
            easeOutQuad(t) {
                return t * (2 - t);
            },

            /**
             * Ease in out quad
             */
            easeInOutQuad(t) {
                return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
            },

            /**
             * Ease out elastic
             */
            easeOutElastic(t) {
                const p = 0.3;
                return Math.pow(2, -10 * t) * Math.sin((t - p / 4) * (2 * Math.PI) / p) + 1;
            },

            /**
             * Calculate Mines multiplier
             */
            calculateMinesMultiplier(revealed, totalTiles, mines) {
                if (revealed === 0) return 1;
                
                const safeTiles = totalTiles - mines;
                let multiplier = 1;
                
                for (let i = 0; i < revealed; i++) {
                    const remaining = safeTiles - i;
                    const total = totalTiles - i;
                    multiplier *= total / remaining;
                }
                
                // Apply house edge
                multiplier *= (1 - CONFIG.games.mines.houseEdge);
                
                return Math.max(1, multiplier);
            },

            /**
             * Generate crash point using provably fair algorithm
             */
            generateCrashPoint() {
                const houseEdge = CONFIG.games.crash.houseEdge;
                const random = Math.random();
                
                // If random is less than house edge, instant crash
                if (random < houseEdge) {
                    return 1.00;
                }
                
                // Generate crash point using exponential distribution
                const crashPoint = 1 / (1 - random / (1 - houseEdge));
                
                return Math.min(Math.max(1.00, crashPoint), CONFIG.games.crash.maxMultiplier);
            },

            /**
             * Format date for display
             */
            formatDate(timestamp) {
                const date = new Date(timestamp);
                const now = new Date();
                const diff = now - date;
                
                if (diff < 60000) return 'Just now';
                if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
                if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
                
                return date.toLocaleDateString();
            }
        };

            save(key, data) {

                    console.error('Failed to save data:', e);
                    return false;

            load(key, defaultValue = null) {

                    return JSON.parse(serialized);

            addBalance(amount) {

        // ============================================
        // SECTION 4: SOUND MANAGER (Web Audio API)
        // ============================================

        const SoundManager = {
            audioContext: null,
            sounds: {},
            currentlyPlaying: null,
            masterVolume: CONFIG.sounds.masterVolume,
            enabled: true,
            initialized: false,
            loadedSounds: new Set(),
            failedSounds: new Set(),

            /**
             * Initialize the Sound Manager
             */
            async init() {
                if (this.initialized) return;

                try {
                    // Create AudioContext
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    this.audioContext = new AudioContext();

                    // Load settings
                    const settings = DataManager.getSettings();
                    this.enabled = settings.soundEnabled;
                    this.masterVolume = settings.masterVolume;

                    // Preload critical sounds
                    await this.preloadSounds();

                    this.initialized = true;
                    console.log('SoundManager initialized');
                } catch (e) {
                    console.error('Failed to initialize SoundManager:', e);
                    this.enabled = false;
                }
            },

            /**
             * Preload all sounds
             */
            async preloadSounds() {
                const soundUrls = CONFIG.sounds.urls;
                const loadPromises = [];

                for (const [key, url] of Object.entries(soundUrls)) {
                    loadPromises.push(this.loadSound(key, url));
                }

                await Promise.allSettled(loadPromises);
                console.log(`Loaded ${this.loadedSounds.size}/${Object.keys(soundUrls).length} sounds`);
            },

            /**
             * Load a single sound
             */
            async loadSound(key, url) {
                try {
                    const response = await fetch(url, { mode: 'cors' });
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);

                    const arrayBuffer = await response.arrayBuffer();
                    const audioBuffer = await this.audioContext.decodeAudioData(arrayBuffer);

                    this.sounds[key] = {
                        buffer: audioBuffer,
                        url: url
                    };

                    this.loadedSounds.add(key);
                    return true;
                } catch (e) {
                    console.warn(`Failed to load sound "${key}":`, e.message);
                    this.failedSounds.add(key);

                    // Create fallback with HTML Audio
                    this.sounds[key] = {
                        fallbackUrl: url,
                        isFallback: true
                    };

                    return false;
                }
            },

            /**
             * Resume AudioContext (required after user interaction)
             */
            async resume() {
                if (this.audioContext && this.audioContext.state === 'suspended') {
                    await this.audioContext.resume();
                }
            },

            /**
             * Play a sound by key
             */
            async play(key, options = {}) {
                if (!this.enabled) return null;

                const volume = options.volume !== undefined ? options.volume : 1;
                const loop = options.loop || false;

                try {
                    // Resume context if needed
                    await this.resume();

                    // Stop currently playing sound
                    if (this.currentlyPlaying) {
                        this.stop();
                    }

                    const sound = this.sounds[key];
                    if (!sound) {
                        console.warn(`Sound "${key}" not found`);
                        return null;
                    }

                    // Use fallback HTML Audio if Web Audio failed
                    if (sound.isFallback) {
                        return this.playFallback(key, sound.fallbackUrl, volume, loop);
                    }

                    // Create buffer source
                    const source = this.audioContext.createBufferSource();
                    source.buffer = sound.buffer;
                    source.loop = loop;

                    // Create gain node for volume control
                    const gainNode = this.audioContext.createGain();
                    gainNode.gain.value = volume * this.masterVolume;

                    // Connect nodes
                    source.connect(gainNode);
                    gainNode.connect(this.audioContext.destination);

                    // Start playing
                    source.start(0);

                    // Store reference
                    this.currentlyPlaying = {
                        source: source,
                        gainNode: gainNode,
                        key: key,
                        isWebAudio: true
                    };

                    // Handle end event
                    source.onended = () => {
                        if (this.currentlyPlaying && this.currentlyPlaying.source === source) {
                            this.currentlyPlaying = null;
                        }
                    };

                    return this.currentlyPlaying;
                } catch (e) {
                    console.error(`Failed to play sound "${key}":`, e);
                    return null;
                }
            },

            /**
             * Play sound using fallback HTML Audio
             */
            playFallback(key, url, volume, loop) {
                try {
                    const audio = new Audio(url);
                    audio.volume = volume * this.masterVolume;
                    audio.loop = loop;

                    audio.play().catch(e => {
                        console.warn(`Fallback audio failed for "${key}":`, e);
                    });

                    this.currentlyPlaying = {
                        audio: audio,
                        key: key,
                        isWebAudio: false
                    };

                    audio.onended = () => {
                        if (this.currentlyPlaying && this.currentlyPlaying.audio === audio) {
                            this.currentlyPlaying = null;
                        }
                    };

                    return this.currentlyPlaying;
                } catch (e) {
                    console.error(`Fallback audio error for "${key}":`, e);
                    return null;
                }
            },

            /**
             * Stop currently playing sound
             */
            stop() {
                if (!this.currentlyPlaying) return;

                try {
                    if (this.currentlyPlaying.isWebAudio) {
                        this.currentlyPlaying.source.stop();
                    } else {
                        this.currentlyPlaying.audio.pause();
                        this.currentlyPlaying.audio.currentTime = 0;
                    }
                } catch (e) {
                    // Sound may have already ended
                }

                this.currentlyPlaying = null;
            },

            /**
             * Set master volume
             */
            setVolume(volume) {
                this.masterVolume = Utils.clamp(volume, 0, 1);
                DataManager.updateSettings({ masterVolume: this.masterVolume });

                // Update currently playing sound volume
                if (this.currentlyPlaying) {
                    if (this.currentlyPlaying.isWebAudio && this.currentlyPlaying.gainNode) {
                        this.currentlyPlaying.gainNode.gain.value = this.masterVolume;
                    } else if (this.currentlyPlaying.audio) {

            /**

            /**
             * Check if a sound is loaded
             */
            isLoaded(key) {

        // ============================================
        // SECTION 5: ANIMATION ENGINE
        // ============================================

        const AnimationEngine = {
            animations: new Map(),
            frameId: null,
            running: false,

            /**
             * Start the animation loop
             */
            start() {
                if (this.running) return;
                this.running = true;
                this.loop();
            },

            /**
             * Stop the animation loop
             */
            stop() {
                this.running = false;
                if (this.frameId) {
                    cancelAnimationFrame(this.frameId);
                    this.frameId = null;
                }
            },

            /**
             * Animation loop
             */
            loop() {
                if (!this.running) return;

                const now = performance.now();

                // Update all animations
                for (const [id, anim] of this.animations) {
                    if (anim.completed) {
                        this.animations.delete(id);
                        continue;
                    }

                    const elapsed = now - anim.startTime;
                    const progress = Math.min(elapsed / anim.duration, 1);
                    const easedProgress = anim.easing(progress);

                    // Call update function
                    anim.update(easedProgress, anim);

                    // Check if completed
                    if (progress >= 1) {
                        anim.completed = true;
                        if (anim.onComplete) {
                            anim.onComplete();
                        }
                    }
                }

                // Continue loop if animations exist
                if (this.animations.size > 0) {
                    this.frameId = requestAnimationFrame(() => this.loop());
                } else {
                    this.running = false;
                }
            },

            /**
             * Create a new animation
             */
            animate(options) {
                const id = Utils.generateId();
                const animation = {
                    id: id,
                    startTime: performance.now(),
                    duration: options.duration || 300,
                    easing: options.easing || Utils.easeOutQuad,
                    update: options.update,
                    onComplete: options.onComplete,
                    from: options.from,
                    to: options.to,
                    completed: false
                };

                this.animations.set(id, animation);
                this.start();

                return id;
            },

            /**
             * Cancel an animation
             */
            cancel(id) {
                this.animations.delete(id);
            },

            /**
             * Cancel all animations
             */
            cancelAll() {
                this.animations.clear();
            },

            /**
             * Animate a counter from one value to another
             */
            animateCounter(element, from, to, options = {}) {
                const duration = options.duration || CONFIG.ui.counterAnimationDuration;
                const format = options.format || (v => v.toFixed(2));
                const prefix = options.prefix || '';
                const suffix = options.suffix || '';

                return this.animate({
                    duration: duration,
                    easing: options.easing || Utils.easeOutQuad,
                    from: from,
                    to: to,
                    update: (progress, anim) => {
                        const value = Utils.lerp(anim.from, anim.to, progress);
                        element.textContent = prefix + format(value) + suffix;
                    },
                    onComplete: options.onComplete
                });
            },

            /**
             * Animate element opacity
             */
            fadeIn(element, duration = 300) {
                element.style.opacity = '0';
                element.style.display = '';

                return this.animate({
                    duration: duration,
                    update: (progress) => {
                        element.style.opacity = progress.toString();
                    }
                });
            },

            /**
             * Fade out element
             */
            fadeOut(element, duration = 300) {
                return this.animate({
                    duration: duration,
                    update: (progress) => {
                        element.style.opacity = (1 - progress).toString();
                    },
                    onComplete: () => {
                        element.style.display = 'none';
                    }
                });
            },

            /**
             * Animate element scale
             */
            scale(element, from, to, duration = 300) {
                return this.animate({
                    duration: duration,
                    easing: Utils.easeOutElastic,
                    update: (progress) => {
                        const scale = Utils.lerp(from, to, progress);
                        element.style.transform = `scale(${scale})`;
                    }
                });
            },

            /**
             * Shake animation
             */
            shake(element, intensity = 5, duration = 500) {
                const originalTransform = element.style.transform;

                return this.animate({
                    duration: duration,
                    update: (progress) => {
                        const decay = 1 - progress;
                        const x = (Math.random() - 0.5) * intensity * decay;
                        const y = (Math.random() - 0.5) * intensity * decay;
                        element.style.transform = `translate(${x}px, ${y}px)`;
                    },
                    onComplete: () => {
                        element.style.transform = originalTransform;
                    }
                });
            },

            /**
             * Pulse animation
             */
            pulse(element, scale = 1.1, duration = 300) {
                return new Promise(resolve => {
                    this.animate({
                        duration: duration / 2,
                        easing: Utils.easeOutQuad,
                        update: (progress) => {
                            const s = Utils.lerp(1, scale, progress);
                            element.style.transform = `scale(${s})`;
                        },
                        onComplete: () => {
                            this.animate({
                                duration: duration / 2,
                                easing: Utils.easeOutQuad,
                                update: (progress) => {
                                    const s = Utils.lerp(scale, 1, progress);
                                    element.style.transform = `scale(${s})`;
                                },
                                onComplete: resolve
                            });
                        }
                    });
                });
            },

            /**
             * Bounce animation
             */
            bounce(element, height = 20, duration = 500) {
                return this.animate({
                    duration: duration,
                    easing: Utils.easeOutElastic,
                    update: (progress) => {
                        const y = Math.sin(progress * Math.PI) * height * (1 - progress);
                        element.style.transform = `translateY(${-y}px)`;
                    }
                });
            },

            /**
             * Slide in from direction
             */
            slideIn(element, direction = 'bottom', distance = 50, duration = 300) {
                const transforms = {
                    top: `translateY(-${distance}px)`,
                    bottom: `translateY(${distance}px)`,
                    left: `translateX(-${distance}px)`,
                    right: `translateX(${distance}px)`
                };

                element.style.transform = transforms[direction];
                element.style.opacity = '0';

                return this.animate({
                    duration: duration,
                    easing: Utils.easeOutQuad,
                    update: (progress) => {
                        const dist = distance * (1 - progress);
                        const transforms = {
                            top: `translateY(-${dist}px)`,
                            bottom: `translateY(${dist}px)`,
                            left: `translateX(-${dist}px)`,
                            right: `translateX(${dist}px)`
                        };
                        element.style.transform = transforms[direction];
                        element.style.opacity = progress.toString();
                    },
                    onComplete: () => {
                        element.style.transform = '';
                        element.style.opacity = '';
                    }
                });
            }
        };
