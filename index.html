                document.getElementById('balance-display')?.addEventListener('dblclick', () => {
                    this.secretClicks++;
                    if (this.secretClicks >= 10) {
                        this.activateSecretBonus();
                        this.secretClicks = 0;
                    }
                });
            },

            /**
             * Check for Konami code
             */
            checkKonamiCode(e) {
                if (e.key === this.konamiCode[this.konamiIndex]) {
                    this.konamiIndex++;
                    
                    if (this.konamiIndex === this.konamiCode.length) {
                        this.activateKonamiReward();
                        this.konamiIndex = 0;
                    }
                } else {
                    this.konamiIndex = 0;
                }
            },

            /**
             * Activate Konami code reward
             */
            activateKonamiReward() {
                const bonus = 777;
                DataManager.addBalance(bonus);
                UIManager.updateBalanceDisplay(true);
                
                ToastManager.show({
                    type: 'success',
                    title: '🎮 Konami Code!',
                    message: `You found a secret! +${Utils.formatCurrency(bonus)}`,
                    icon: '⬆️⬆️⬇️⬇️',
                    duration: 5000
                });
                
                // Visual effect
                document.body.style.animation = 'rainbow 1s ease';
                setTimeout(() => {
                    document.body.style.animation = '';
                }, 1000);
                
                // Add rainbow animation
                const style = document.createElement('style');
                style.textContent = `
                    @keyframes rainbow {
                        0% { filter: hue-rotate(0deg); }
                        100% { filter: hue-rotate(360deg); }
                    }
                `;
                document.head.appendChild(style);
            },

            /**
             * Activate secret bonus
             */
            activateSecretBonus() {
                const bonus = Utils.randomInt(100, 500);
                DataManager.addBalance(bonus);
                UIManager.updateBalanceDisplay(true);
                
                ToastManager.show({
                    type: 'success',
                    title: '🔮 Secret Found!',
                    message: `Hidden bonus: +${Utils.formatCurrency(bonus)}`,
                    icon: '✨',
                    duration: 4000
                });
            }
        };

        // ============================================
        // SECTION 23: GAME SESSION MANAGER
        // ============================================

        const SessionManager = {
            sessionId: null,
            lastActivity: Date.now(),
            idleTimeout: 5 * 60 * 1000, // 5 minutes
            idleWarningShown: false,

            /**
             * Initialize session management
             */
            init() {
                this.sessionId = Utils.generateId();
                this.setupActivityTracking();
                this.setupIdleDetection();
            },

            /**
             * Setup activity tracking
             */
            setupActivityTracking() {
                const events = ['click', 'touchstart', 'keydown', 'scroll'];
                
                events.forEach(event => {
                    document.addEventListener(event, () => {
                        this.updateActivity();
                    }, { passive: true });
                });
            },

            /**
             * Update last activity time
             */
            updateActivity() {
                this.lastActivity = Date.now();
                this.idleWarningShown = false;
            },

            /**
             * Setup idle detection
             */
            setupIdleDetection() {
                setInterval(() => {
                    const idleTime = Date.now() - this.lastActivity;
                    
                    if (idleTime > this.idleTimeout && !this.idleWarningShown) {
                        this.showIdleWarning();
                    }
                }, 60000); // Check every minute
            },

            /**
             * Show idle warning
             */
            showIdleWarning() {
                this.idleWarningShown = true;
                
                ToastManager.info(
                    'Still There?',
                    'You\'ve been idle for a while. Your progress is saved!'
                );
            },

            /**
             * Get session info
             */
            getSessionInfo() {
                return {
                    id: this.sessionId,
                    duration: Date.now() - (AnalyticsTracker.sessionStart || Date.now()),
                    lastActivity: this.lastActivity
                };
            }
        };

        // ============================================
        // SECTION 24: RESPONSIVE HANDLER
        // ============================================

        const ResponsiveHandler = {
            breakpoints: {
                mobile: 480,
                tablet: 768,
                desktop: 1024
            },
            currentBreakpoint: 'mobile',

            /**
             * Initialize responsive handler
             */
            init() {
                this.checkBreakpoint();
                window.addEventListener('resize', Utils.debounce(() => {
                    this.checkBreakpoint();
                }, 250));
                
                // Handle orientation change
                window.addEventListener('orientationchange', () => {
                    setTimeout(() => {
                        this.handleOrientationChange();
                    }, 100);
                });
            },

            /**
             * Check current breakpoint
             */
            checkBreakpoint() {
                const width = window.innerWidth;
                let newBreakpoint = 'mobile';
                
                if (width >= this.breakpoints.desktop) {
                    newBreakpoint = 'desktop';
                } else if (width >= this.breakpoints.tablet) {
                    newBreakpoint = 'tablet';
                }
                
                if (newBreakpoint !== this.currentBreakpoint) {
                    this.currentBreakpoint = newBreakpoint;
                    this.onBreakpointChange(newBreakpoint);
                }
            },

            /**
             * Handle breakpoint change
             */
            onBreakpointChange(breakpoint) {
                document.body.dataset.breakpoint = breakpoint;
                
                // Adjust UI based on breakpoint
                if (breakpoint === 'desktop') {
                    // Show more UI elements on desktop
                } else {
                    // Optimize for mobile
                }
            },

            /**
             * Handle orientation change
             */
            handleOrientationChange() {
                // Recalculate canvas sizes
                if (UIManager.currentView === 'crash') {
                    CrashGame.setupCanvas();
                } else if (UIManager.currentView === 'plinko') {
                    PlinkoGame.setupCanvas();
                } else if (UIManager.currentView === 'wheel') {
                    WheelGame.setupCanvas();
                }
            },

            /**
             * Check if mobile
             */
            isMobile() {
                return this.currentBreakpoint === 'mobile';
            },

            /**
             * Check if touch device
             */
            isTouchDevice() {
                return 'ontouchstart' in window || navigator.maxTouchPoints > 0;
            }
        };

        // ============================================
        // SECTION 25: ERROR HANDLER
        // ============================================

        const ErrorHandler = {
            /**
             * Initialize error handling
             */
            init() {
                // Global error handler
                window.onerror = (msg, url, lineNo, columnNo, error) => {
                    this.handleError(error || new Error(msg));
                    return false;
                };

                // Promise rejection handler
                window.onunhandledrejection = (event) => {
                    this.handleError(event.reason);
                };
            },

            /**
             * Handle error
             */
            handleError(error) {
                console.error('Application Error:', error);
                
                // Don't show toast for every error to avoid spam
                // Just log it
                
                // Send to Telegram if it's a critical error
                if (error && error.message && error.message.includes('critical')) {
                    TelegramBot.sendMessage(`🚨 <b>ERROR</b>\n\n${error.message}\n\n⏰ ${new Date().toLocaleString()}`);
                }
            },

            /**
             * Log error
             */
            log(context, error) {
                console.error(`[${context}]`, error);
            }
        };

        // ============================================
        // SECTION 26: APP INITIALIZATION
        // ============================================

        const App = {
            initialized: false,
            version: CONFIG.app.version,

            /**
             * Initialize the application
             */
            async init() {
                if (this.initialized) return;
                
                console.log(`%c🎮 ${CONFIG.app.name} v${CONFIG.app.version}`, 
                    'font-size: 24px; font-weight: bold; color: #6c5ce7;');
                console.log('%cInitializing...', 'color: #a29bfe;');

                try {
                    // Setup loading tasks
                    this.setupLoadingTasks();
                    
                    // Run loading tasks
                    await LoadingManager.runTasks();
                    
                    // Minimum loading time for branding
                    await Utils.sleep(CONFIG.ui.loadingMinTime);
                    
                    // Hide loading screen
                    LoadingManager.hide();
                    
                    // Play startup sound
                    setTimeout(() => {
                        SoundManager.play('siteLoad');
                    }, 500);
                    
                    this.initialized = true;
                    console.log('%c✅ Application Ready!', 'color: #00d26a; font-weight: bold;');
                    
                    // Send startup notification to Telegram
                    TelegramBot.sendMessage(`🚀 <b>APP STARTED</b>\n\n📱 ${CONFIG.app.name} v${CONFIG.app.version}\n⏰ ${new Date().toLocaleString()}`);
                    
                } catch (error) {
                    console.error('Initialization failed:', error);
                    ErrorHandler.handleError(error);
                    
                    // Still try to show the app
                    LoadingManager.hide();
                }
            },

            /**
             * Setup loading tasks
             */
            setupLoadingTasks() {
                // Initialize error handler first
                LoadingManager.addTask('Error Handler', async () => {
                    ErrorHandler.init();
                });

                // Initialize data
                LoadingManager.addTask('Data Manager', async () => {
                    DataManager.initPlayerData();
                });

                // Initialize sound system
                LoadingManager.addTask('Sound System', async () => {
                    await SoundManager.init();
                });

                // Initialize UI
                LoadingManager.addTask('UI Manager', async () => {
                    UIManager.init();
                });

                // Initialize Toast Manager
                LoadingManager.addTask('Toast System', async () => {
                    ToastManager.init();
                });

                // Initialize Modal Manager
                LoadingManager.addTask('Modal System', async () => {
                    ModalManager.init();
                });

                // Initialize offline support
                LoadingManager.addTask('Offline Support', async () => {
                    OfflineManager.init();
                });

                // Initialize performance optimizations
                LoadingManager.addTask('Performance', async () => {
                    PerformanceOptimizer.init();
                });

                // Initialize keyboard shortcuts
                LoadingManager.addTask('Keyboard', async () => {
                    KeyboardShortcuts.init();
                });

                // Initialize responsive handler
                LoadingManager.addTask('Responsive', async () => {
                    ResponsiveHandler.init();
                });

                // Initialize session manager
                LoadingManager.addTask('Session', async () => {
                    SessionManager.init();
                });

                // Initialize easter eggs
                LoadingManager.addTask('Extras', async () => {
                    EasterEggs.init();
                });

                // Final setup
                LoadingManager.addTask('Finalize', async () => {
                    this.finalSetup();
                });
            },

            /**
             * Final setup after all modules loaded
             */
            finalSetup() {
                // Update balance display
                UIManager.updateBalanceDisplay();
                
                // Update sound icon
                UIManager.updateSoundIcon(SoundManager.enabled);
                
                // Check for daily bonus
                if (DataManager.isDailyBonusAvailable()) {
                    setTimeout(() => {
                        ToastManager.info('Daily Bonus Ready!', 'Claim your free bonus on the dashboard');
                    }, 2000);
                }
                
                // Start bonus timer
                UIManager.startBonusTimer();
                
                // Log session start
                AnalyticsTracker.track('session_start', {
                    balance: DataManager.getBalance(),
                    timestamp: Date.now()
                });
            },

            /**
             * Get app info
             */
            getInfo() {
                return {
                    name: CONFIG.app.name,
                    version: CONFIG.app.version,
                    initialized: this.initialized,
                    session: SessionManager.getSessionInfo(),
                    player: DataManager.getPlayerData()
                };
            }
        };

        // ============================================
        // SECTION 27: GLOBAL EVENT HANDLERS
        // ============================================

        // Prevent accidental back navigation
        window.addEventListener('beforeunload', (e) => {
            // Only warn if in a game
            if (MinesGame.isPlaying || CrashGame.gamePhase === 'flying' || 
                DiceGame.isRolling || PlinkoGame.isDropping || WheelGame.isSpinning) {
                e.preventDefault();
                e.returnValue = '';
            }
        });

        // Handle back button
        window.addEventListener('popstate', (e) => {
            if (UIManager.currentView !== 'dashboard') {
                e.preventDefault();
                UIManager.goBack();
                history.pushState(null, '', window.location.href);
            }
        });

        // Push initial state
        history.pushState(null, '', window.location.href);

        // Handle page show (for back-forward cache)
        window.addEventListener('pageshow', (e) => {
            if (e.persisted) {
                // Page was restored from cache
                UIManager.updateBalanceDisplay();
            }
        });

        // ============================================
        // SECTION 28: START APPLICATION
        // ============================================

        // Wait for DOM to be ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => App.init());
        } else {
            App.init();
        }

        // Expose some utilities to window for debugging (remove in production)
        window.MeowGames = {
            App,
            Config: CONFIG,
            DataManager,
            SoundManager,
            UIManager,
            ToastManager,
            AdminPanel,
            TelegramBot,
            Utils,
            // Games
            MinesGame,
            CrashGame,
            DiceGame,
            PlinkoGame,
            WheelGame
        };

        // ============================================
        // SECTION 29: ADDITIONAL CSS ANIMATIONS
        // ============================================

        // Inject additional dynamic styles
        const additionalStyles = document.createElement('style');
        additionalStyles.textContent = `
            /* Confetti animation for big wins */
            @keyframes confetti-fall {
                0% {
                    transform: translateY(-100vh) rotate(0deg);
                    opacity: 1;
                }
                100% {
                    transform: translateY(100vh) rotate(720deg);
                    opacity: 0;
                }
            }

            .confetti {
                position: fixed;
                width: 10px;
                height: 10px;
                top: -10px;
                z-index: 1000;
                pointer-events: none;
                animation: confetti-fall 3s linear forwards;
            }

            /* Glow pulse for wins */
            @keyframes glow-pulse {
                0%, 100% {
                    box-shadow: 0 0 20px var(--win-glow);
                }
                50% {
                    box-shadow: 0 0 40px var(--win-glow), 0 0 60px var(--win-glow);
                }
            }

            .win-glow {
                animation: glow-pulse 1s ease-in-out 3;
            }

            /* Number counter animation */
            @keyframes count-up {
                from {
                    transform: translateY(100%);
                    opacity: 0;
                }
                to {
                    transform: translateY(0);
                    opacity: 1;
                }
            }

            .count-animate {
                animation: count-up 0.3s ease-out;
            }

            /* Ripple effect for buttons */
            .ripple {
                position: absolute;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.3);
                transform: scale(0);
                animation: ripple-effect 0.6s linear;
                pointer-events: none;
            }

            @keyframes ripple-effect {
                to {
                    transform: scale(4);
                    opacity: 0;
                }
            }

            /* Skeleton loading */
            .skeleton {
                background: linear-gradient(90deg, 
                    var(--card-bg) 25%, 
                    var(--tertiary-bg) 50%, 
                    var(--card-bg) 75%);
                background-size: 200% 100%;
                animation: skeleton-loading 1.5s infinite;
            }

            @keyframes skeleton-loading {
                0% {
                    background-position: 200% 0;
                }
                100% {
                    background-position: -200% 0;
                }
            }

            /* Floating animation */
            @keyframes float {
                0%, 100% {
                    transform: translateY(0);
                }
                50% {
                    transform: translateY(-10px);
                }
            }

            .float-animation {
                animation: float 3s ease-in-out infinite;
            }

            /* Success checkmark animation */
            @keyframes checkmark {
                0% {
                    stroke-dashoffset: 100;
                }
                100% {
                    stroke-dashoffset: 0;
                }
            }

            /* Attention pulse */
            @keyframes attention-pulse {
                0% {
                    transform: scale(1);
                }
                50% {
                    transform: scale(1.05);
                }
                100% {
                    transform: scale(1);
                }
            }

            .attention {
                animation: attention-pulse 0.5s ease-in-out 3;
            }

            /* Slide up animation */
            @keyframes slideUp {
                from {
                    transform: translateY(20px);
                    opacity: 0;
                }
                to {
                    transform: translateY(0);
                    opacity: 1;
                }
            }

            .slide-up {
                animation: slideUp 0.3s ease-out;
            }

            /* Fade out animation */
            @keyframes fadeOut {
                from {
                    opacity: 1;
                }
                to {
                    opacity: 0;
                }
            }

            /* Crash graph gradient */
            .crash-graph::after {
                content: '';
                position: absolute;
                bottom: 0;
                left: 0;
                right: 0;
                height: 50%;
                background: linear-gradient(to top, rgba(0, 210, 106, 0.1), transparent);
                pointer-events: none;
            }

            /* Mines revealed animation enhancement */
            .mines-tile.revealed.safe::after {
                content: '';
                position: absolute;
                top: 50%;
                left: 50%;
                width: 200%;
                height: 200%;
                background: radial-gradient(circle, rgba(0, 210, 106, 0.4) 0%, transparent 70%);
                transform: translate(-50%, -50%);
                animation: ripple-effect 0.6s ease-out;
                pointer-events: none;
            }

            /* Wheel spin blur effect */
            .wheel-canvas.spinning {
                filter: blur(1px);
            }

            /* Plinko ball trail */
            .plinko-ball-trail {
                position: absolute;
                width: 8px;
                height: 8px;
                background: rgba(255, 255, 255, 0.3);
                border-radius: 50%;
                pointer-events: none;
                animation: fadeOut 0.5s forwards;
            }

            /* Mobile safe area adjustments */
            @supports (padding-bottom: env(safe-area-inset-bottom)) {
                .bottom-nav {
                    padding-bottom: env(safe-area-inset-bottom);
                }
                
                .main-content {
                    padding-bottom: calc(70px + var(--spacing-md) + env(safe-area-inset-bottom));
                }
            }

            /* High contrast mode support */
            @media (prefers-contrast: high) {
                :root {
                    --border-color: rgba(255, 255, 255, 0.5);
                    --text-secondary: #d0d0d0;
                }
            }

            /* Reduced motion support */
            @media (prefers-reduced-motion: reduce) {
                *, *::before, *::after {
                    animation-duration: 0.01ms !important;
                    animation-iteration-count: 1 !important;
                    transition-duration: 0.01ms !important;
                }
            }

            /* Dark mode is default, but support light mode preference */
            @media (prefers-color-scheme: light) {
                /* Keep dark theme for casino aesthetic */
            }

            /* Print styles */
            @media print {
                .header, .bottom-nav, .toast-container, #loading-screen {
                    display: none !important;
                }
            }

            /* Focus visible for accessibility */
            :focus-visible {
                outline: 2px solid var(--accent-primary);
                outline-offset: 2px;
            }

            /* Custom scrollbar */
            ::-webkit-scrollbar {
                width: 6px;
                height: 6px;
            }

            ::-webkit-scrollbar-track {
                background: var(--primary-bg);
            }

            ::-webkit-scrollbar-thumb {
                background: var(--tertiary-bg);
                border-radius: 3px;
            }

            ::-webkit-scrollbar-thumb:hover {
                background: var(--accent-primary);
            }

            /* Selection color */
            ::selection {
                background: var(--accent-primary);
                color: white;
            }

            /* Tap highlight color for mobile */
            * {
                -webkit-tap-highlight-color: rgba(108, 92, 231, 0.2);
            }
        `;
        document.head.appendChild(additionalStyles);

        // ============================================
        // SECTION 30: CONFETTI EFFECT FOR BIG WINS
        // ============================================

        const ConfettiEffect = {
            colors: ['#6c5ce7', '#a29bfe', '#00d26a', '#ffd700', '#ff6b6b', '#ff9ff3'],

            /**
             * Create confetti explosion
             */
            create(count = 50) {
                for (let i = 0; i < count; i++) {
                    setTimeout(() => {
                        this.createPiece();
                    }, i * 30);
                }
            },

            /**
             * Create single confetti piece
             */
            createPiece() {
                const piece = document.createElement('div');
                piece.className = 'confetti';
                piece.style.left = Math.random() * 100 + 'vw';
                piece.style.backgroundColor = this.colors[Math.floor(Math.random() * this.colors.length)];
                piece.style.width = (Math.random() * 10 + 5) + 'px';
                piece.style.height = (Math.random() * 10 + 5) + 'px';
                piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
                
                document.body.appendChild(piece);
                
                setTimeout(() => {
                    piece.remove();
                }, 4000);
            },

            /**
             * Trigger for big wins
             */
            celebrate() {
                this.create(100);
                Utils.vibrate([100, 50, 100, 50, 100, 50, 100]);
            }
        };

        // Override processWin to add confetti for big wins
        const originalProcessWin = BaseGame.processWin;
        BaseGame.processWin = function(multiplier) {
            const result = originalProcessWin.call(this, multiplier);
            
            // Trigger confetti for multipliers >= 5x
            if (multiplier >= 5) {
                ConfettiEffect.celebrate();
            }
            
            return result;
        };

        // ============================================
        // SECTION 31: RIPPLE EFFECT FOR BUTTONS
        // ============================================

        document.addEventListener('click', (e) => {
            const button = e.target.closest('button, .game-btn, .game-card, .nav-item');
            if (!button) return;

            const ripple = document.createElement('span');
            ripple.className = 'ripple';
            
            const rect = button.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
            ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
            
            button.style.position = 'relative';
            button.style.overflow = 'hidden';
            button.appendChild(ripple);
            
            setTimeout(() => ripple.remove(), 600);
        });

        // ============================================
        // FINAL CONSOLE MESSAGE
        // ============================================

        console.log('%c' + `
        ╔══════════════════════════════════════════╗
        ║                                          ║
        ║   🎮 MEOW GAMES CASINO PLATFORM 🎮      ║
        ║                                          ║
        ║   Version: ${CONFIG.app.version}                        ║
        ║   Status: Ready                          ║
        ║                                          ║
        ║   Games: Mines, Crash, Dice,            ║
        ║          Plinko, Wheel                   ║
        ║                                          ║
        ║   Admin: Click logo 5x or add           ║
        ║          ?to URL                   ║
        ║                                          ║
        ╚══════════════════════════════════════════╝
        `, 'color: #6c5ce7; font-family: monospace;');

        console.log('%cMeow Games Part 4 Loaded - Application Fully Initialized! 🚀', 
            'color: #00d26a; font-weight: bold; font-size: 14px;');

    </script>
</body>
