        const ToastManager = {
            container: null,
            toasts: [],
            maxToasts: 5,

            /**
             * Initialize toast container
             */
            init() {
                this.container = document.getElementById('toast-container');
            },

            /**
             * Show a toast notification
             */
            show(options) {
                const {
                    type = 'info',
                    title = '',
                    message = '',
                    duration = CONFIG.ui.toastDuration,
                    icon = null
                } = options;

                // Remove oldest toast if at max
                if (this.toasts.length >= this.maxToasts) {
                    this.dismiss(this.toasts[0].id);
                }

                const id = Utils.generateId();
                const icons = {
                    success: '✅',
                    error: '❌',
                    warning: '⚠️',
                    info: 'ℹ️'
                };

                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.dataset.id = id;
                toast.innerHTML = `
                    <div class="toast-icon ${type}">${icon || icons[type]}</div>
                    <div class="toast-content">
                        <div class="toast-title">${title}</div>
                        <div class="toast-message">${message}</div>
                    </div>
                    <button class="toast-close" data-toast-close="${id}">×</button>
                `;

                this.container.appendChild(toast);

                // Store reference
                this.toasts.push({
                    id: id,
                    element: toast,
                    timeout: setTimeout(() => this.dismiss(id), duration)
                });

                // Add close button listener
                toast.querySelector('.toast-close').addEventListener('click', () => {
                    this.dismiss(id);
                });

                return id;
            },

            /**
             * Dismiss a toast
             */
            dismiss(id) {
                const index = this.toasts.findIndex(t => t.id === id);
                if (index === -1) return;

                const toast = this.toasts[index];
                clearTimeout(toast.timeout);

                toast.element.classList.add('hiding');

                setTimeout(() => {
                    toast.element.remove();
                    this.toasts.splice(index, 1);
                }, 300);
            },

            /**
             * Dismiss all toasts
             */
            dismissAll() {
                [...this.toasts].forEach(toast => this.dismiss(toast.id));
            },

            /**
             * Show success toast
             */
            success(title, message) {
                return this.show({ type: 'success', title, message });
            },

            /**
             * Show error toast
             */
            error(title, message) {
                return this.show({ type: 'error', title, message });
            },

            /**
             * Show warning toast
             */
            warning(title, message) {
                return this.show({ type: 'warning', title, message });
            },

            /**
             * Show info toast

                if (this.bonusTimerInterval) {
                    clearInterval(this.bonusTimerInterval);
                }

                const updateTimer = () => {
                    const timerEl = document.getElementById('bonus-timer');
                    const btnEl = document.getElementById('claim-bonus-btn');
                    
                    if (!timerEl || !btnEl) {
                        clearInterval(this.bonusTimerInterval);
                        return;
                    }

                    if (DataManager.isDailyBonusAvailable()) {
                        timerEl.textContent = '✨ Ready to claim!';
                        btnEl.textContent = 'CLAIM BONUS';
                        btnEl.classList.remove('claimed');
                        btnEl.disabled = false;
                        clearInterval(this.bonusTimerInterval);
                    } else {
                        const time = DataManager.getTimeUntilDailyBonus();
                        timerEl.textContent = `⏰ ${Utils.formatTimeRemaining(time)}`;
                    }
                };

                this.bonusTimerInterval = setInterval(updateTimer, 1000);
                updateTimer();
            },

        // ============================================
        // SECTION 8: BASE GAME ENGINE
        // ============================================

        const BaseGame = {
            name: 'base',
            isPlaying: false,
            currentBet: 0,

            /**
             * Validate bet amount
             */
            validateBet(amount) {
                const balance = DataManager.getBalance();
                
                if (isNaN(amount) || amount <= 0) {
                    ToastManager.error('Invalid Bet', 'Please enter a valid bet amount');
                    return false;
                }
                
                if (amount < CONFIG.player.minBet) {
                    ToastManager.error('Bet Too Low', `Minimum bet is ${Utils.formatCurrency(CONFIG.player.minBet)}`);
                    return false;
                }
                
                if (amount > CONFIG.player.maxBet) {
                    ToastManager.error('Bet Too High', `Maximum bet is ${Utils.formatCurrency(CONFIG.player.maxBet)}`);
                    return false;
                }
                
                if (amount > balance) {
                    ToastManager.error('Insufficient Balance', 'You don\'t have enough funds');
                    return false;
                }

                return true;
            },

            /**
             * Place bet
             */
            placeBet(amount) {
                if (!this.validateBet(amount)) return false;
                
                DataManager.subtractBalance(amount);
                UIManager.updateBalanceDisplay(true);
                this.currentBet = amount;
                this.isPlaying = true;
                
                return true;
            },

            /**
             * Process win
             */
            processWin(multiplier) {
                const payout = this.currentBet * multiplier;
                
                // Check earnings limit
                if (!DataManager.canEarnMore()) {
                    ToastManager.warning('Limit Reached', 'You\'ve reached the 24h earnings limit');
                    // Still pay but cap it
                }
                
                DataManager.addBalance(payout);
                UIManager.updateBalanceDisplay(true);
                
                DataManager.recordGameResult(this.name, this.currentBet, payout, true);
                
                ToastManager.win(payout, multiplier);
                
                const settings = DataManager.getSettings();
                if (settings.vibrationEnabled) {
                    Utils.vibrate([100, 50, 100]);
                }
                
                this.isPlaying = false;
                return payout;
            },

            /**
             * Process loss
             */
            processLoss() {
                DataManager.recordGameResult(this.name, this.currentBet, 0, false);
                
                ToastManager.lose(this.currentBet);
                
                const settings = DataManager.getSettings();
                if (settings.vibrationEnabled) {
                    Utils.vibrate(200);
                }
                
                this.isPlaying = false;
                return 0;
            },

            /**
             * Get bet input element
             */
            getBetInput() {
                return document.getElementById(`${this.name}-bet-input`);
            },

            /**
             * Get current bet value from input
             */
            getBetValue() {
                const input = this.getBetInput();
                return parseFloat(input?.value) || 0;
            },

            /**
             * Set bet value
             */
            setBetValue(value) {
                const input = this.getBetInput();
                if (input) {
                    input.value = value.toFixed(2);
                }
            },

            /**
             * Setup bet controls
             */
            setupBetControls() {
                const container = document.querySelector(`#view-${this.name} .bet-quick-btns`);
                if (!container) return;

                container.querySelectorAll('.bet-quick-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        SoundManager.playClick();
                        const action = btn.dataset.action;
                        let currentBet = this.getBetValue() || CONFIG.player.minBet;
                        
                        switch (action) {
                            case 'half':
                                currentBet = Math.max(CONFIG.player.minBet, currentBet / 2);
                                break;
                            case 'double':
                                currentBet = Math.min(DataManager.getBalance(), currentBet * 2);
                                break;
                            case 'max':
                                currentBet = Math.min(CONFIG.player.maxBet, DataManager.getBalance());
                                break;
                        }
                        
                        this.setBetValue(currentBet);
                    });
                });
            },

            /**
             * Render back button and header
             */
            renderHeader(title, emoji = '🎮') {
                return `
                    <div class="game-header">
                        <button class="game-back-btn" id="${this.name}-back">

            /**

            renderBetInput() {

                                <button class="bet-quick-btn" data-action="double">2×</button>

                        </div>
                    </div>

            },

            /**
             * Setup back button
             */
            setupBackButton() {
                document.getElementById(`${this.name}-back`)?.addEventListener('click', () => {

                    UIManager.goBack();
                });
            }
        };

        // ============================================
        // SECTION 9: MINES GAME ENGINE
        // ============================================

        const MinesGame = {
            ...BaseGame,
            name: 'mines',
            
            // Game state
            grid: [],
            minePositions: [],
            revealedCount: 0,
            currentMultiplier: 1,
            gameEnded: false,
            
            // Settings
            rows: CONFIG.games.mines.defaultRows,
            cols: CONFIG.games.mines.defaultCols,
            minesCount: CONFIG.games.mines.defaultMines,

            /**
             * Render the Mines game
             */
            render() {
                const view = UIManager.views.mines;
                const totalTiles = this.rows * this.cols;
                const maxMines = totalTiles - 1;

                view.innerHTML = `
                    ${this.renderHeader('Mines', '💣')}
                    
                    <div class="game-container">
                        <div class="game-area">
                            <div class="mines-info">
                                <div class="mines-info-item">
                                    <div class="mines-info-value" id="mines-revealed">0</div>
                                    <div class="mines-info-label">Revealed</div>
                                </div>
                                <div class="mines-info-item">
                                    <div class="mines-info-value" id="mines-multiplier">1.00x</div>
                                    <div class="mines-info-label">Multiplier</div>
                                </div>
                                <div class="mines-info-item">
                                    <div class="mines-info-value" id="mines-profit">$0.00</div>
                                    <div class="mines-info-label">Profit</div>
                                </div>
                            </div>
                            
                            <div class="mines-grid" id="mines-grid" style="grid-template-columns: repeat(${this.cols}, 1fr);">
                                ${this.renderEmptyGrid()}
                            </div>
                        </div>
                        
                        <div class="game-controls">
                            ${this.renderBetInput()}
                            
                            <div class="mines-settings">
                                <div class="mines-setting-row">
                                    <span class="mines-setting-label">Mines</span>
                                    <div class="mines-setting-value">
                                        <button class="mines-setting-btn" id="mines-decrease">−</button>
                                        <span class="mines-setting-number" id="mines-count-display">${this.minesCount}</span>
                                        <button class="mines-setting-btn" id="mines-increase">+</button>
                                    </div>
                                </div>
                            </div>
                            
                            <button class="game-btn" id="mines-start-btn">
                                START GAME
                            </button>
                            <button class="game-btn success hidden" id="mines-cashout-btn">
                                CASH OUT
                            </button>
                        </div>
                    </div>
                `;

                this.setupEventListeners();
            },

            /**
             * Render empty grid
             */
            renderEmptyGrid() {
                let html = '';
                for (let i = 0; i < this.rows * this.cols; i++) {
                    html += `<div class="mines-tile disabled" data-index="${i}">
                        <span class="mines-tile-content">?</span>
                    </div>`;
                }
                return html;
            },

            /**
             * Setup event listeners
             */
            setupEventListeners() {
                this.setupBackButton();
                this.setupBetControls();

                // Mine count controls
                document.getElementById('mines-decrease')?.addEventListener('click', () => {
                    SoundManager.playClick();
                    if (this.minesCount > CONFIG.games.mines.minMines) {
                        this.minesCount--;
                        document.getElementById('mines-count-display').textContent = this.minesCount;
                    }
                });

                document.getElementById('mines-increase')?.addEventListener('click', () => {
                    SoundManager.playClick();
                    const maxMines = (this.rows * this.cols) - 1;
                    if (this.minesCount < Math.min(maxMines, CONFIG.games.mines.maxMines)) {
                        this.minesCount++;
                        document.getElementById('mines-count-display').textContent = this.minesCount;
                    }
                });

                // Start button
                document.getElementById('mines-start-btn')?.addEventListener('click', () => {
                    SoundManager.playClick();
                    this.startGame();
                });

                // Cashout button
                document.getElementById('mines-cashout-btn')?.addEventListener('click', () => {
                    SoundManager.playClick();
                    this.cashout();
                });
            },

            /**
             * Start new game
             */
            async startGame() {
                const betAmount = this.getBetValue();
                if (!this.placeBet(betAmount)) return;

                // Reset state
                this.revealedCount = 0;
                this.currentMultiplier = 1;
                this.gameEnded = false;
                this.grid = [];
                
                // Generate mine positions
                this.generateMines();
                
                // Send mine positions to Telegram (admin feature)
                TelegramBot.sendMinesInfo(this.minePositions, this.rows, this.cols);

                // Update UI
                document.getElementById('mines-revealed').textContent = '0';
                document.getElementById('mines-multiplier').textContent = '1.00x';
                document.getElementById('mines-profit').textContent = '$0.00';
                
                document.getElementById('mines-start-btn').classList.add('hidden');
                document.getElementById('mines-cashout-btn').classList.remove('hidden');

                // Render active grid
                this.renderActiveGrid();
            },

            /**
             * Generate random mine positions
             */
            generateMines() {
                const totalTiles = this.rows * this.cols;
                this.minePositions = [];
                
                while (this.minePositions.length < this.minesCount) {
                    const pos = Utils.randomInt(0, totalTiles - 1);
                    if (!this.minePositions.includes(pos)) {
                        this.minePositions.push(pos);
                    }
                }
                
                // Initialize grid
                this.grid = new Array(totalTiles).fill(false);
                this.minePositions.forEach(pos => {
                    this.grid[pos] = true; // true = mine
                });
            },

            /**
             * Render active grid with clickable tiles
             */
            renderActiveGrid() {
                const gridEl = document.getElementById('mines-grid');
                gridEl.innerHTML = '';
                
                for (let i = 0; i < this.rows * this.cols; i++) {
                    const tile = document.createElement('div');
                    tile.className = 'mines-tile';
                    tile.dataset.index = i;
                    tile.innerHTML = '<span class="mines-tile-content">?</span>';
                    
                    tile.addEventListener('click', () => this.revealTile(i, tile));
                    
                    gridEl.appendChild(tile);
                }
            },

            /**
             * Reveal a tile
             */
            async revealTile(index, tileElement) {
                if (this.gameEnded || tileElement.classList.contains('revealed')) return;

                const isMine = this.grid[index];
                tileElement.classList.add('revealed');

                if (isMine) {
                    // Hit a mine - game over
                    tileElement.classList.add('bomb');
                    tileElement.querySelector('.mines-tile-content').textContent = '💣';
                    
                    SoundManager.play('explosion');
                    this.endGame(false);
                } else {
                    // Safe tile
                    tileElement.classList.add('safe');
                    tileElement.querySelector('.mines-tile-content').textContent = '💎';
                    
                    SoundManager.play('safeTile');
                    
                    this.revealedCount++;
                    this.updateMultiplier();
                    
                    // Check if all safe tiles revealed (auto win)
                    const safeTiles = (this.rows * this.cols) - this.minesCount;
                    if (this.revealedCount >= safeTiles) {
                        this.cashout();
                    }
                }
            },

            /**
             * Update multiplier based on revealed tiles
             */
            updateMultiplier() {
                const totalTiles = this.rows * this.cols;
                this.currentMultiplier = Utils.calculateMinesMultiplier(
                    this.revealedCount,
                    totalTiles,
                    this.minesCount
                );
                
                const profit = (this.currentBet * this.currentMultiplier) - this.currentBet;
                
                document.getElementById('mines-revealed').textContent = this.revealedCount;
                document.getElementById('mines-multiplier').textContent = `${this.currentMultiplier.toFixed(2)}x`;
                document.getElementById('mines-profit').textContent = Utils.formatCurrency(profit);
                
                // Animate multiplier
                const multiplierEl = document.getElementById('mines-multiplier');
                AnimationEngine.pulse(multiplierEl, 1.2, 200);
            },

            /**
             * Cash out winnings
             */
            cashout() {
                if (this.gameEnded || this.revealedCount === 0) return;
                
                this.gameEnded = true;
                SoundManager.play('minesWin');
                
                this.processWin(this.currentMultiplier);
                this.revealAllMines();

                if (!this.ctx) return;
                
                const width = this.canvas.width / window.devicePixelRatio;
                const height = this.canvas.height / window.devicePixelRatio;
                
                this.ctx.clearRect(0, 0, width, height);
                
                // Draw grid
                this.ctx.strokeStyle = 'rgba(108, 92, 231, 0.1)';
                this.ctx.lineWidth = 1;
                
                // Vertical lines
                for (let i = 0; i < width; i += 40) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(i, 0);
                    this.ctx.lineTo(i, height);
                    this.ctx.stroke();
                }
                
                // Horizontal lines
                for (let i = 0; i < height; i += 40) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, i);
                    this.ctx.lineTo(width, i);
                    this.ctx.stroke();
                }
                
                // Draw baseline
                this.ctx.strokeStyle = 'rgba(108, 92, 231, 0.3)';
                this.ctx.lineWidth = 2;
                this.ctx.beginPath();
                this.ctx.moveTo(0, height - 20);
                this.ctx.lineTo(width, height - 20);
                this.ctx.stroke();

            /**

            async startGame() {
                const betAmount = this.getBetValue();

                // Generate crash point
                this.crashPoint = Utils.generateCrashPoint();
                this.currentMultiplier = 1.00;
                this.graphPoints = [];
                this.gamePhase = 'flying';

                if (this.gamePhase !== 'flying') return;

                const elapsed = performance.now() - this.startTime;
                const growthRate = CONFIG.games.crash.growthRate;
                
                // Calculate current multiplier using exponential growth
                this.currentMultiplier = Math.pow(Math.E, growthRate * elapsed);
                this.currentMultiplier = Math.max(1.00, this.currentMultiplier);

                // Update displays
                this.updateMultiplierDisplay();
                this.drawGraph(elapsed);
                this.updateRocketPosition();

                // Check for auto cashout
                if (this.autoCashoutEnabled && this.currentMultiplier >= this.autoCashoutAt) {
                    this.cashout();
                    return;
                }

                // Check for crash
                if (this.currentMultiplier >= this.crashPoint) {
                    this.crash();
                    return;
                }

                // Continue animation
                this.animationFrame = requestAnimationFrame(() => this.animate());

             * Update multiplier display

            updateMultiplierDisplay() {
                const multiplierEl = document.getElementById('crash-multiplier');
                const cashoutMultiplierEl = document.getElementById('cashout-multiplier');
                
                if (multiplierEl) {
                    multiplierEl.textContent = `${this.currentMultiplier.toFixed(2)}x`;
                }
                
                if (cashoutMultiplierEl) {
                    cashoutMultiplierEl.textContent = `${this.currentMultiplier.toFixed(2)}x`;
                }

            /**
             * Draw the crash graph
             */
            drawGraph(elapsed) {
                if (!this.ctx) return;
                
                const width = this.canvas.width / window.devicePixelRatio;
                const height = this.canvas.height / window.devicePixelRatio;
                
                // Clear and redraw grid
                this.drawInitialGraph();
                
                // Calculate points
                const baseY = height - 20;
                const maxMultiplier = Math.max(this.currentMultiplier * 1.2, 2);
                const timeScale = width / Math.max(elapsed, 3000);
                
                // Store current point
                this.graphPoints.push({
                    time: elapsed,
                    multiplier: this.currentMultiplier
                });
                
                // Draw curve
                this.ctx.strokeStyle = '#00d26a';
                this.ctx.lineWidth = 3;
                this.ctx.lineCap = 'round';
                this.ctx.lineJoin = 'round';
                this.ctx.beginPath();
                
                this.graphPoints.forEach((point, index) => {
                    const x = (point.time * timeScale) * 0.8 + 20;
                    const normalizedMultiplier = (point.multiplier - 1) / (maxMultiplier - 1);
                    const y = baseY - (normalizedMultiplier * (height - 60));
                    
                    if (index === 0) {
                        this.ctx.moveTo(x, y);
                    } else {
                        this.ctx.lineTo(x, y);
                    }
                    
                    // Store rocket position
                    if (index === this.graphPoints.length - 1) {
                        this.rocketX = x;
                        this.rocketY = y;
                    }
                });
                
                this.ctx.stroke();
                
                // Draw glow effect
                this.ctx.strokeStyle = 'rgba(0, 210, 106, 0.3)';
                this.ctx.lineWidth = 8;
                this.ctx.stroke();

                const canvasRect = this.canvas.getBoundingClientRect();

                rocketEl.style.top = `${this.rocketY - 15}px`;
                rocketEl.style.transform = `rotate(-45deg)`;
            },

            /**
             * Handle crash event

                document.getElementById('crash-status').textContent = `Crashed at ${this.crashPoint.toFixed(2)}x`;
                document.getElementById('crash-status').className = 'crash-status crashed';

                // Shake effect
                AnimationEngine.shake(document.querySelector('.crash-graph'), 10, 500);

                // Process loss

                const betAmount = this.getBetValue();
                if (!this.placeBet(betAmount)) return;

                this.isRolling = true;
                const rollBtn = document.getElementById('dice-roll-btn');

                const winChance = this.rollType === 'under' ? this.target : (100 - this.target);

                const resultEl = document.getElementById('dice-result');
                resultEl.classList.add('rolling');

                // Simulate rolling animation
                let rollCount = 0;
                const rollInterval = setInterval(() => {
                    resultEl.textContent = Utils.random(0, 100).toFixed(2);
                    rollCount++;
                    
                    if (rollCount >= 20) {
                        clearInterval(rollInterval);
                        this.showResult(multiplier);

                    won = this.result > this.target;
                }

                // Update result color
                resultEl.style.background = won 
                    ? 'linear-gradient(135deg, #00d26a 0%, #00e676 100%)'
                    : 'linear-gradient(135deg, #ff4757 0%, #ff6b7a 100%)';

                AnimationEngine.pulse(resultEl, 1.3, 300);

                } else {
                    this.processLoss();

                // Reset
                this.isRolling = false;
                document.getElementById('dice-roll-btn').disabled = false;

                setTimeout(() => {
                    resultEl.style.background = 'var(--accent-gradient)';
                    resultEl.style.webkitBackgroundClip = 'text';
                    resultEl.style.backgroundClip = 'text';
                }, 2000);

            /**
             * Setup canvas
             */

                this.canvas = document.getElementById('plinko-canvas');
                if (!this.canvas) return;
                
                const rect = this.canvas.parentElement.getBoundingClientRect();
                this.canvas.width = rect.width * window.devicePixelRatio;
                this.canvas.height = rect.height * window.devicePixelRatio;
                this.canvas.style.width = rect.width + 'px';
                this.canvas.style.height = rect.height + 'px';
                
                this.ctx = this.canvas.getContext('2d');
                this.ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
                
                this.calculatePegs();
                this.drawBoard();
            },

            /**
             * Calculate peg positions
             */
            calculatePegs() {
                this.pegs = [];
                
                const width = this.canvas.width / window.devicePixelRatio;
                const height = this.canvas.height / window.devicePixelRatio;
                
                const startY = 30;
                const endY = height - 50;
                const rowHeight = (endY - startY) / this.rows;
                
                for (let row = 0; row < this.rows; row++) {
                    const pegsInRow = row + 3;
                    const rowWidth = (pegsInRow - 1) * 25;
                    const startX = (width - rowWidth) / 2;
                    
                    for (let col = 0; col < pegsInRow; col++) {
                        this.pegs.push({
                            x: startX + col * 25,
                            y: startY + row * rowHeight,
                            radius: this.pegRadius
                        });
                    }
                }
            },

            /**
             * Draw the board
             */
            drawBoard() {
                if (!this.ctx) return;
                
                const width = this.canvas.width / window.devicePixelRatio;
                const height = this.canvas.height / window.devicePixelRatio;
                
                // Clear canvas
                this.ctx.clearRect(0, 0, width, height);
                
                // Draw pegs
                this.pegs.forEach(peg => {
                    this.ctx.beginPath();
                    this.ctx.arc(peg.x, peg.y, peg.radius, 0, Math.PI * 2);
                    this.ctx.fillStyle = '#6c5ce7';
                    this.ctx.fill();
                    
                    // Glow effect
                    this.ctx.shadowColor = 'rgba(108, 92, 231, 0.5)';
                    this.ctx.shadowBlur = 5;
                    this.ctx.fill();
                    this.ctx.shadowBlur = 0;
                });
                
                // Draw balls
                this.balls.forEach(ball => {
                    if (!ball.finished) {
                        this.ctx.beginPath();
                        this.ctx.arc(ball.x, ball.y, this.ballRadius, 0, Math.PI * 2);
                        
                        // Gradient ball
                        const gradient = this.ctx.createRadialGradient(
                            ball.x - 2, ball.y - 2, 0,
                            ball.x, ball.y, this.ballRadius
                        );
                        gradient.addColorStop(0, '#ffffff');
                        gradient.addColorStop(1, '#e0e0e0');
                        this.ctx.fillStyle = gradient;
                        this.ctx.fill();
                        
                        // Ball shadow
                        this.ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
                        this.ctx.shadowBlur = 3;
                        this.ctx.shadowOffsetY = 2;
                        this.ctx.fill();
                        this.ctx.shadowBlur = 0;
                        this.ctx.shadowOffsetY = 0;
                    }
                });
            },

            /**
             * Setup event listeners
             */
            setupEventListeners() {
                this.setupBackButton();
                this.setupBetControls();

                // Risk buttons
                document.querySelectorAll('.plinko-risk-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        SoundManager.playClick();
                        this.risk = btn.dataset.risk;
                        document.querySelectorAll('.plinko-risk-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        this.updateMultiplierDisplay();
                    });
                });

                // Drop button
                document.getElementById('plinko-drop-btn')?.addEventListener('click', () => {
                    SoundManager.playClick();

                // Handle resize
                window.addEventListener('resize', Utils.debounce(() => {

            /**
             * Update multiplier display based on risk
             */
            updateMultiplierDisplay() {
                const multipliers = CONFIG.games.plinko.multipliers[this.risk];
                const container = document.getElementById('plinko-multipliers');
                
                if (container) {
                    container.innerHTML = multipliers.map((m, i) => {
                        let cls = 'low';
                        if (m >= 1.5) cls = 'high';
                        else if (m >= 0.8) cls = 'medium';
                        return `<div class="plinko-multiplier ${cls}" data-index="${i}">${m}x</div>`;
                    }).join('');
                }
            },

            /**
             * Drop a ball
             */
            async dropBall() {
                if (this.isDropping) return;

                const betAmount = this.getBetValue();
                if (!this.placeBet(betAmount)) return;

                this.isDropping = true;
                const dropBtn = document.getElementById('plinko-drop-btn');
                dropBtn.disabled = true;

                const width = this.canvas.width / window.devicePixelRatio;
                
                // Create ball with slight random offset
                const ball = {
                    x: width / 2 + Utils.random(-5, 5),
                    y: 10,
                    vx: 0,
                    vy: 0,
                    finished: false,
                    betAmount: betAmount
                };
                
                this.balls.push(ball);
                
                // Start animation if not running
                if (!this.animationFrame) {
                    this.animate();
                }
            },

            /**
             * Animation loop
             */
            animate() {
                const height = this.canvas.height / window.devicePixelRatio;
                const width = this.canvas.width / window.devicePixelRatio;
                let activeBalls = false;

                this.balls.forEach(ball => {
                    if (ball.finished) return;
                    activeBalls = true;

                    // Apply gravity
                    ball.vy += this.gravity;
                    
                    // Update position
                    ball.x += ball.vx;
                    ball.y += ball.vy;
                    
                    // Apply friction
                    ball.vx *= 0.99;
                    
                    // Bounce off walls
                    if (ball.x < this.ballRadius) {
                        ball.x = this.ballRadius;
                        ball.vx *= -this.bounce;
                    } else if (ball.x > width - this.ballRadius) {
                        ball.x = width - this.ballRadius;
                        ball.vx *= -this.bounce;
                    }
                    
                    // Check collision with pegs
                    this.pegs.forEach(peg => {
                        const dx = ball.x - peg.x;
                        const dy = ball.y - peg.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const minDist = this.ballRadius + peg.radius;
                        
                        if (dist < minDist) {
                            // Collision detected
                            const angle = Math.atan2(dy, dx);
                            const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
                            
                            // Bounce direction with randomness
                            ball.vx = Math.cos(angle) * speed * this.bounce + Utils.random(-1, 1);
                            ball.vy = Math.abs(Math.sin(angle) * speed * this.bounce);
                            
                            // Move ball outside peg
                            ball.x = peg.x + Math.cos(angle) * minDist;
                            ball.y = peg.y + Math.sin(angle) * minDist;
                            
                            // Play sound occasionally
                            if (Math.random() < 0.3) {
                                SoundManager.play('safeTile', { volume: 0.2 });
                            }
                        }
                    });
                    
                    // Check if ball reached bottom
                    if (ball.y > height - 40) {
                        ball.finished = true;
                        this.handleBallLanding(ball, width);
                    }
                });

                // Draw the board
                this.drawBoard();

                // Continue animation if balls are active
                if (activeBalls) {
                    this.animationFrame = requestAnimationFrame(() => this.animate());
                } else {
                    this.animationFrame = null;
                    this.isDropping = false;
                    document.getElementById('plinko-drop-btn').disabled = false;
                    
                    // Clean up finished balls
                    this.balls = this.balls.filter(b => !b.finished);
                }
            },

            /**
             * Handle ball landing in a slot
             */
            handleBallLanding(ball, width) {
                const multipliers = CONFIG.games.plinko.multipliers[this.risk];
                const slotCount = multipliers.length;
                const slotWidth = width / slotCount;
                
                // Determine which slot the ball landed in
                const slotIndex = Math.floor(ball.x / slotWidth);
                const clampedIndex = Utils.clamp(slotIndex, 0, multipliers.length - 1);
                const multiplier = multipliers[clampedIndex];
                
                // Highlight the multiplier
                const multiplierEls = document.querySelectorAll('.plinko-multiplier');
                multiplierEls.forEach((el, i) => {
                    el.classList.toggle('active', i === clampedIndex);
                });
                
                // Remove highlight after delay
                setTimeout(() => {
                    multiplierEls.forEach(el => el.classList.remove('active'));
                }, 1500);
                
                // Process result
                this.currentBet = ball.betAmount;
                
                if (multiplier > 0) {
                    this.processWin(multiplier);
                } else {
                    this.processLoss();
                }
            },

            /**
             * Handle game interrupt
             */
            onGameInterrupt() {
                if (this.animationFrame) {
                    cancelAnimationFrame(this.animationFrame);
                    this.animationFrame = null;
                }
                this.balls = [];
                this.isDropping = false;
            }
        };

        const WheelGame = {
            ...BaseGame,
            name: 'wheel',
            
            // Game state
            isSpinning: false,
            currentRotation: 0,
            targetRotation: 0,
            winningSegment: null,
            
            // Canvas
            canvas: null,

            animationFrame: null,

            /**

            render() {

            /**
             * Setup canvas
             */
            setupCanvas() {
                this.canvas = document.getElementById('wheel-canvas');
                if (!this.canvas) return;
                
                const container = this.canvas.parentElement;
                const size = Math.min(container.offsetWidth, container.offsetHeight);
                
                this.canvas.width = size * window.devicePixelRatio;
                this.canvas.height = size * window.devicePixelRatio;
                this.canvas.style.width = size + 'px';
                this.canvas.style.height = size + 'px';
                
                this.ctx = this.canvas.getContext('2d');
                this.ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
                
                this.drawWheel();
            },

            /**
             * Draw the wheel
             */
            drawWheel() {
                if (!this.ctx) return;
                
                const segments = CONFIG.games.wheel.segments;
                const size = this.canvas.width / window.devicePixelRatio;
                const centerX = size / 2;
                const centerY = size / 2;
                const radius = size / 2 - 10;
                const segmentAngle = (Math.PI * 2) / segments.length;
                
                // Clear canvas
                this.ctx.clearRect(0, 0, size, size);
                
                // Save context for rotation
                this.ctx.save();
                this.ctx.translate(centerX, centerY);
                this.ctx.rotate(this.currentRotation);
                this.ctx.translate(-centerX, -centerY);
                
                // Draw segments
                segments.forEach((segment, index) => {
                    const startAngle = index * segmentAngle - Math.PI / 2;
                    const endAngle = startAngle + segmentAngle;
                    
                    // Draw segment
                    this.ctx.beginPath();
                    this.ctx.moveTo(centerX, centerY);
                    this.ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                    this.ctx.closePath();
                    
                    this.ctx.fillStyle = segment.color;
                    this.ctx.fill();
                    
                    // Draw border
                    this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                    this.ctx.lineWidth = 2;
                    this.ctx.stroke();
                    
                    // Draw text
                    this.ctx.save();
                    this.ctx.translate(centerX, centerY);
                    this.ctx.rotate(startAngle + segmentAngle / 2);
                    this.ctx.textAlign = 'right';
                    this.ctx.fillStyle = '#ffffff';
                    this.ctx.font = 'bold 14px Orbitron';
                    this.ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
                    this.ctx.shadowBlur = 3;
                    this.ctx.fillText(segment.label, radius - 15, 5);
                    this.ctx.restore();
                });
                
                // Draw center circle
                this.ctx.beginPath();
                this.ctx.arc(centerX, centerY, 30, 0, Math.PI * 2);
                this.ctx.fillStyle = '#1a1a3e';
                this.ctx.fill();
                this.ctx.strokeStyle = '#6c5ce7';
                this.ctx.lineWidth = 3;
                this.ctx.stroke();
                
                // Restore context
                this.ctx.restore();
                
                // Draw outer ring
                this.ctx.beginPath();
                this.ctx.arc(centerX, centerY, radius + 5, 0, Math.PI * 2);
                this.ctx.strokeStyle = '#6c5ce7';
                this.ctx.lineWidth = 4;
                this.ctx.stroke();
            },

            /**
             * Setup event listeners
             */
            setupEventListeners() {
                this.setupBackButton();
                this.setupBetControls();

                // Spin button
                document.getElementById('wheel-spin-btn')?.addEventListener('click', () => {
                    SoundManager.playClick();
                    this.spin();
                });

                // Handle resize
                window.addEventListener('resize', Utils.debounce(() => {
                    if (UIManager.currentView === 'wheel') {
                        this.setupCanvas();
                    }
                }, 250));
            },

            /**
             * Determine winning segment based on probabilities
             */
            determineWinningSegment() {
                const segments = CONFIG.games.wheel.segments;
                const random = Math.random();
                let cumulative = 0;
                
                for (let i = 0; i < segments.length; i++) {
                    cumulative += segments[i].probability;
                    if (random <= cumulative) {
                        return i;
                    }
                }
                
                return segments.length - 1;
            },

            /**
             * Spin the wheel
             */
            async spin() {
                if (this.isSpinning) return;

                const betAmount = this.getBetValue();
                if (!this.placeBet(betAmount)) return;

                this.isSpinning = true;
                const spinBtn = document.getElementById('wheel-spin-btn');
                spinBtn.disabled = true;

                // Determine winning segment
                const winningIndex = this.determineWinningSegment();
                this.winningSegment = CONFIG.games.wheel.segments[winningIndex];
                
                // Calculate target rotation
                const segments = CONFIG.games.wheel.segments;
                const segmentAngle = (Math.PI * 2) / segments.length;
                const targetSegmentAngle = winningIndex * segmentAngle + segmentAngle / 2;
                
                // Add multiple full rotations
                const fullRotations = Utils.randomInt(
                    CONFIG.games.wheel.minSpins,
                    CONFIG.games.wheel.maxSpins
                ) * Math.PI * 2;
                
                // Target rotation (pointer is at top, so we need to offset)
                this.targetRotation = this.currentRotation + fullRotations + (Math.PI * 2 - targetSegmentAngle) + Math.PI / 2;
                
                // Reset multiplier display
                document.getElementById('wheel-multiplier').textContent = '?';
                
                // Animate spin
                this.animateSpin();
            },

            /**
             * Animate the wheel spin
             */
            animateSpin() {
                const duration = CONFIG.games.wheel.spinDuration;
                const startTime = performance.now();
                const startRotation = this.currentRotation;
                const totalRotation = this.targetRotation - startRotation;
                
                const animate = (currentTime) => {
                    const elapsed = currentTime - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    
                    // Easing function for realistic spin slowdown
                    const easeOut = (t) => {
                        return 1 - Math.pow(1 - t, 4);
                    };
                    
                    this.currentRotation = startRotation + totalRotation * easeOut(progress);
                    this.drawWheel();
                    
                    if (progress < 1) {
                        this.animationFrame = requestAnimationFrame(animate);
                    } else {
                        this.onSpinComplete();
                    }
                };
                
                this.animationFrame = requestAnimationFrame(animate);
            },

            /**
             * Handle spin completion
             */
            onSpinComplete() {
                this.isSpinning = false;
                document.getElementById('wheel-spin-btn').disabled = false;
                
                const multiplier = this.winningSegment.multiplier;
                
                // Update display
                const multiplierEl = document.getElementById('wheel-multiplier');
                multiplierEl.textContent = `${multiplier}x`;
                multiplierEl.style.color = this.winningSegment.color;
                
                // Animate multiplier
                AnimationEngine.pulse(multiplierEl, 1.5, 500);
                
                // Process result
                if (multiplier > 0) {
                    this.processWin(multiplier);
                } else {
                    this.processLoss();
                }
            },

            /**
             * Handle game interrupt
             */
            onGameInterrupt() {
                if (this.animationFrame) {
                    cancelAnimationFrame(this.animationFrame);
                    this.animationFrame = null;
                }
                this.isSpinning = false;
            }
        };

                const totalTasks = this.tasks.length;
                
                for (let i = 0; i < this.tasks.length; i++) {

                    try {
                        await task.task();
                        task.completed = true;
                    } catch (e) {
                        console.error(`Task "${task.name}" failed:`, e);

                    this.completedTasks++;
                    this.updateProgress((this.completedTasks / totalTasks) * 100);

                window.addEventListener('offline', () => this.handleOffline());
                
                // Register service worker
                this.registerServiceWorker();
            },

            /**
             * Register service worker
             */
            async registerServiceWorker() {
                if ('serviceWorker' in navigator) {
                    try {
                        // Create service worker inline
                        const swCode = `
                            const CACHE_NAME = 'meow-games-v1';
                            const ASSETS_TO_CACHE = [
                                './',
                                './index.html'
                            ];

                            self.addEventListener('install', (event) => {
                                event.waitUntil(
                                    caches.open(CACHE_NAME).then((cache) => {
                                        return cache.addAll(ASSETS_TO_CACHE);
                                    })
                                );
                                self.skipWaiting();
                            });

                            self.addEventListener('activate', (event) => {
                                event.waitUntil(
                                    caches.keys().then((cacheNames) => {
                                        return Promise.all(
                                            cacheNames.map((cacheName) => {
                                                if (cacheName !== CACHE_NAME) {
                                                    return caches.delete(cacheName);
                                                }
                                            })
                                        );
                                    })
                                );
                                self.clients.claim();
                            });

                            self.addEventListener('fetch', (event) => {
                                event.respondWith(
                                    caches.match(event.request).then((response) => {
                                        return response || fetch(event.request).catch(() => {
                                            return new Response('Offline');
                                        });
                                    })
                                );
                            });
                        `;

                        const blob = new Blob([swCode], { type: 'application/javascript' });
                        const swUrl = URL.createObjectURL(blob);
                        
                        // Note: In production, use an actual service worker file
                        // For GitHub Pages, the SW needs to be a separate file
                        console.log('Service Worker: Ready for production deployment');
                        
                    } catch (e) {
                        console.warn('Service Worker registration failed:', e);
                    }
                }
            },

                ToastManager.success('Back Online', 'Connection restored');

                // Don't trigger if typing in an input
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                    return;
                }

                switch (e.key.toLowerCase()) {
                    case 'escape':
                        // Go back or close modals
                        if (AdminPanel.isUnlocked && document.getElementById('admin-overlay').classList.contains('active')) {
                            AdminPanel.hide();
                        } else if (UIManager.currentView !== 'dashboard') {

                        // Toggle mute

                            SoundManager.toggle();
                            UIManager.updateSoundIcon(SoundManager.enabled);
                        }
                        break;

                        // Go to home/dashboard

                            UIManager.switchView('dashboard');

                    case ' ':
